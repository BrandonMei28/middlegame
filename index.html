<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Middlegame Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap');
:root{--bg:#0e0c0a;--surface:#1a1714;--surface2:#252118;--border:#3a3328;--gold:#c9a84c;--cream:#f2e8d0;--cream-dim:#a89b7e;--light-sq:#f0d9b5;--dark-sq:#b58863;--sel-l:#f6f669;--sel-d:#baca2b;--hint-l:#cdd16f;--hint-d:#aaa23a;--last-l:#cdd26a;--last-d:#aaa23a;--red:#e04040;--dim:#8a8070}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--cream);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(201,168,76,.03) 0%,transparent 60%);pointer-events:none}
.screen{display:none;width:100%;max-width:920px;padding:20px}
.screen.active{display:flex;flex-direction:column;align-items:center}
/* HOME */
.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;text-align:center}
h1{font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,58px);font-weight:900;line-height:1;color:var(--cream);text-align:center;letter-spacing:-1px}
h1 span{color:var(--gold);font-style:italic}
.subtitle{margin-top:14px;color:var(--cream-dim);font-size:13px;letter-spacing:.5px;line-height:1.7;text-align:center}
.home-header{margin-bottom:38px}
.config-panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:34px;width:100%;max-width:480px}
.cfg-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:11px}
.cfg-group{margin-bottom:24px}
.toggle-row{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.toggle-btn{flex:1;padding:12px 0;background:transparent;border:none;color:var(--cream-dim);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--gold);color:var(--bg);font-weight:500}
.toggle-btn:not(.active):hover{background:var(--surface2);color:var(--cream)}
.diff-row{display:flex;gap:8px}
.diff-btn{flex:1;padding:12px 8px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.diff-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.diff-btn:not(.active):hover{border-color:var(--cream-dim);color:var(--cream)}
.gen-btn{width:100%;padding:16px;background:var(--gold);border:none;border-radius:3px;color:var(--bg);font-family:'Playfair Display',serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.gen-btn:hover{background:var(--cream);transform:translateY(-1px)}
.gen-btn:active{transform:translateY(0)}
/* GAME */
#game-screen{flex-direction:column;gap:14px}
.topbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);font-style:italic}
.topbar-btns{display:flex;gap:8px}
.top-btn{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.top-btn:hover{border-color:var(--gold);color:var(--gold)}
.top-btn.danger:hover{border-color:var(--red);color:var(--red)}
.game-layout{display:flex;gap:20px;align-items:flex-start;width:100%;justify-content:center}
.board-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.player-lbl{display:flex;align-items:center;gap:9px;font-size:12px;letter-spacing:1px;color:var(--cream-dim);width:100%;padding:0 2px}
.pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
#chessboard{display:grid;grid-template-columns:repeat(8,1fr);width:min(468px,88vw);height:min(468px,88vw);border:2px solid var(--border);border-radius:2px;overflow:hidden;user-select:none}
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sq.light{background:var(--light-sq)}.sq.dark{background:var(--dark-sq)}
.sq.sel{background:var(--sel-l)!important}.sq.sel.dark{background:var(--sel-d)!important}
.sq.last-from.light,.sq.last-to.light{background:var(--last-l)}
.sq.last-from.dark,.sq.last-to.dark{background:var(--last-d)}
.sq.hint.light{background:var(--hint-l)}.sq.hint.dark{background:var(--hint-d)}
.coord{position:absolute;font-size:9px;font-family:'DM Mono',monospace;font-weight:500;color:rgba(0,0,0,.28);line-height:1;pointer-events:none}
.sq.dark .coord{color:rgba(255,255,255,.22)}
.coord.file{bottom:2px;right:3px}.coord.rank{top:2px;left:3px}
.piece{width:87%;height:87%;pointer-events:none;position:relative;z-index:2}
.move-dot{width:30%;height:30%;border-radius:50%;background:rgba(0,0,0,.18);pointer-events:none;position:absolute;z-index:1}
.cap-ring{width:87%;height:87%;border-radius:50%;border:4px solid rgba(0,0,0,.2);pointer-events:none;position:absolute;z-index:1}
/* SIDEBAR */
.sidebar{width:205px;display:flex;flex-direction:column;gap:13px;padding-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:13px}
.card-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.status-txt{font-size:13px;color:var(--cream);line-height:1.6;min-height:36px}
.eval-row{display:flex;align-items:center;gap:8px}
.eval-bar{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.eval-fill{height:100%;background:var(--cream);border-radius:4px;transition:width .4s ease;width:50%}
.eval-score{font-size:11px;color:var(--cream-dim);width:38px;text-align:right}
.move-list{max-height:210px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.move-list::-webkit-scrollbar{width:4px}
.move-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.move-pair{display:grid;grid-template-columns:20px 1fr 1fr;gap:4px;align-items:center;font-size:12px;padding:2px 4px;border-radius:2px}
.move-pair:hover{background:var(--surface2)}
.move-num{color:var(--dim);font-size:10px}
.move-san{color:var(--cream);padding:2px 3px;border-radius:2px}
/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center}
.overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--gold);border-radius:4px;padding:28px;text-align:center}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:16px}
.promo-row{display:flex;gap:12px;justify-content:center}
.promo-btn{width:62px;height:62px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.promo-btn:hover{border-color:var(--gold)}
.result-box{background:var(--surface);border:1px solid var(--gold);border-radius:4px;padding:38px 46px;text-align:center;max-width:340px}
.result-box h2{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--gold);margin-bottom:8px}
.result-box p{color:var(--cream-dim);font-size:13px;margin-bottom:26px;line-height:1.6}
.result-btns{display:flex;gap:10px;justify-content:center}
.r-btn{padding:10px 20px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;border:1px solid var(--border);background:transparent;color:var(--cream)}
.r-btn.primary{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500}
.r-btn:hover{opacity:.82}
@media(max-width:660px){.game-layout{flex-direction:column;align-items:center}.sidebar{width:min(468px,88vw);flex-direction:row;flex-wrap:wrap}.card{flex:1;min-width:130px}}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen active">
  <div class="home-header">
    <div class="eyebrow">Chess Trainer</div>
    <h1>Middlegame<br><span>Battleground</span></h1>
    <p class="subtitle">Step into balanced, equal positions and<br>prove your middlegame mastery.</p>
  </div>
  <div class="config-panel">
    <div class="cfg-group">
      <div class="cfg-label">Play as</div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-color="white" onclick="selectColor('white')">♔ White</button>
        <button class="toggle-btn" data-color="black" onclick="selectColor('black')">♚ Black</button>
      </div>
    </div>
    <div class="cfg-group">
      <div class="cfg-label">Difficulty</div>
      <div class="diff-row">
        <button class="diff-btn active" data-diff="easy" onclick="selectDiff('easy')">Easy</button>
        <button class="diff-btn" data-diff="normal" onclick="selectDiff('normal')">Normal</button>
        <button class="diff-btn" data-diff="hard" onclick="selectDiff('hard')">Hard</button>
      </div>
    </div>
    <button class="gen-btn" onclick="generateMiddlegame()">Generate Middlegame →</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="topbar">
    <div class="logo">Middlegame</div>
    <div class="topbar-btns">
      <button class="top-btn" onclick="restartGame()">↺ Restart</button>
      <button class="top-btn danger" onclick="goHome()">⌂ Home</button>
    </div>
  </div>
  <div class="game-layout">
    <div class="board-wrap">
      <div class="player-lbl"><span class="pip" id="top-pip"></span><span id="top-name">Computer</span></div>
      <div id="chessboard"></div>
      <div class="player-lbl"><span class="pip" id="bot-pip"></span><span id="bot-name">You</span></div>
    </div>
    <div class="sidebar">
      <div class="card"><div class="card-title">Status</div><div class="status-txt" id="status-txt">Your move</div></div>
      <div class="card"><div class="card-title">Evaluation</div><div class="eval-row"><div class="eval-bar"><div class="eval-fill" id="eval-fill"></div></div><div class="eval-score" id="eval-score">0.0</div></div></div>
      <div class="card"><div class="card-title">Move History</div><div class="move-list" id="move-list"></div></div>
      <div class="card"><div class="card-title">Settings</div><div style="font-size:11px;color:var(--cream-dim);line-height:1.9" id="settings-disp"></div></div>
    </div>
  </div>
</div>

<!-- PROMOTION MODAL -->
<div class="overlay" id="promo-overlay">
  <div class="modal"><h3>Promote Pawn</h3><div class="promo-row" id="promo-row"></div></div>
</div>

<!-- RESULT MODAL -->
<div class="overlay" id="result-overlay">
  <div class="result-box">
    <h2 id="r-title">Game Over</h2>
    <p id="r-desc">—</p>
    <div class="result-btns">
      <button class="r-btn primary" onclick="restartGame()">Play Again</button>
      <button class="r-btn" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const W=1, B=0;
const P=1,N=2,Bi=3,R=4,Q=5,K=6; // piece types
const FILES='abcdefgh';

// 0x88 board helpers
const sq=(f,r)=>r*16+f;
const fileOf=s=>s&7;
const rankOf=s=>s>>4;
const sqN=s=>FILES[fileOf(s)]+(rankOf(s)+1);
const parseSq=n=>sq(FILES.indexOf(n[0]),parseInt(n[1])-1);
const valid=s=>!(s&0x88);

const CHAR_TO_TYPE={p:P,n:N,b:Bi,r:R,q:Q,k:K};
const TYPE_TO_CHAR=[,'p','n','b','r','q','k'];
const TYPE_TO_VAL=[,100,320,330,500,900,20000];

const SLIDE_DIAG=[-17,-15,15,17];
const SLIDE_ORTH=[-16,-1,1,16];
const SLIDE_ALL=[...SLIDE_DIAG,...SLIDE_ORTH];
const KNIGHT_D=[-33,-31,-18,-14,14,18,31,33];
const KING_D=SLIDE_ALL;

// Piece-square tables (from white's view, rank 8→1 = index 0→63)
const PST={
[P]:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
[N]:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
[Bi]:[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
[R]:[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],
[Q]:[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],
[K]:[-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20]
};

function pstIdx(s,color){
  const f=fileOf(s),r=rankOf(s);
  return color===W?(7-r)*8+f:r*8+f;
}

// ═══════════════════════════════════════════════════════════
//  CHESS GAME CLASS
// ═══════════════════════════════════════════════════════════
class Chess {
  constructor(fen){
    this.board=new Array(128).fill(null);
    this.turn=W;
    this.castling={WK:true,WQ:true,BK:true,BQ:true};
    this.ep=null;
    this.halfmove=0; this.fullmove=1;
    this.history=[];
    this.positionCount={};
    fen&&this._loadFen(fen);
  }

  _loadFen(fen){
    this.board.fill(null);
    const [pos,turn,castle,ep,hm,fm]=fen.trim().split(/\s+/);
    const rows=pos.split('/');
    for(let r=7;r>=0;r--){
      let f=0;
      for(const ch of rows[7-r]){
        if(ch>='1'&&ch<='8'){f+=+ch;}
        else{
          const color='PNBRQK'.includes(ch)?W:B;
          this.board[sq(f,r)]={t:CHAR_TO_TYPE[ch.toLowerCase()],c:color};
          f++;
        }
      }
    }
    this.turn=turn==='w'?W:B;
    this.castling={WK:castle.includes('K'),WQ:castle.includes('Q'),BK:castle.includes('k'),BQ:castle.includes('q')};
    this.ep=ep&&ep!=='-'?parseSq(ep):null;
    this.halfmove=+hm||0; this.fullmove=+fm||1;
    this._recordPosition();
  }

  _recordPosition(){
    const key=this._posKey();
    this.positionCount[key]=(this.positionCount[key]||0)+1;
  }
  _posKey(){
    // Simple position key: piece placement + turn + ep
    let k='';
    for(let i=0;i<128;i++){if(valid(i)){const p=this.board[i];k+=p?`${p.c}${p.t}`:'.'}}
    return k+this.turn+(this.ep??'-');
  }

  get(sqStr){
    const p=this.board[parseSq(sqStr)];
    if(!p)return null;
    return{color:p.c===W?'w':'b',type:TYPE_TO_CHAR[p.t]};
  }

  // Generate all pseudo-legal moves
  _genMoves(color){
    const opp=1-color;
    const moves=[];
    const addM=(from,to,extra={})=>moves.push({from,to,...extra});

    for(let s=0;s<128;s++){
      if(!valid(s))continue;
      const p=this.board[s];
      if(!p||p.c!==color)continue;

      if(p.t===P){
        const dir=color===W?16:-16;
        const startR=color===W?1:6;
        const promR=color===W?7:0;
        // pushes
        const t1=s+dir;
        if(valid(t1)&&!this.board[t1]){
          if(rankOf(t1)===promR){for(const pp of[Q,R,Bi,N])addM(s,t1,{promo:pp});}
          else{
            addM(s,t1);
            if(rankOf(s)===startR){const t2=s+dir*2;if(valid(t2)&&!this.board[t2])addM(s,t2,{dp:true});}
          }
        }
        // captures
        for(const df of[-1,1]){
          const tc=s+dir+df;
          if(!valid(tc))continue;
          const target=this.board[tc];
          const isEp=this.ep===tc;
          if((target&&target.c===opp)||isEp){
            if(rankOf(tc)===promR){for(const pp of[Q,R,Bi,N])addM(s,tc,{promo:pp,cap:true});}
            else addM(s,tc,{cap:true,ep:isEp});
          }
        }
      } else if(p.t===N){
        for(const d of KNIGHT_D){const t=s+d;if(valid(t)&&(!this.board[t]||this.board[t].c===opp))addM(s,t,{cap:!!this.board[t]});}
      } else if(p.t===K){
        for(const d of KING_D){const t=s+d;if(valid(t)&&(!this.board[t]||this.board[t].c===opp))addM(s,t,{cap:!!this.board[t]});}
        // castling
        if(color===W){
          if(this.castling.WK&&!this.board[5]&&!this.board[6])addM(s,6,{castle:'WK'});
          if(this.castling.WQ&&!this.board[1]&&!this.board[2]&&!this.board[3])addM(s,2,{castle:'WQ'});
        } else {
          if(this.castling.BK&&!this.board[117]&&!this.board[118])addM(s,118,{castle:'BK'});
          if(this.castling.BQ&&!this.board[113]&&!this.board[114]&&!this.board[115])addM(s,114,{castle:'BQ'});
        }
      } else {
        const dirs=p.t===Bi?SLIDE_DIAG:p.t===R?SLIDE_ORTH:SLIDE_ALL;
        for(const d of dirs){
          let t=s+d;
          while(valid(t)){
            if(this.board[t]){if(this.board[t].c===opp)addM(s,t,{cap:true});break;}
            addM(s,t);
            t+=d;
          }
        }
      }
    }
    return moves;
  }

  _kingSquare(color){
    for(let s=0;s<128;s++){if(valid(s)&&this.board[s]?.c===color&&this.board[s]?.t===K)return s;}
    return -1;
  }

  _attacked(sq0,byColor){
    // Pawn
    const pawnDir=byColor===W?-16:16;
    for(const df of[-1,1]){const s=sq0+pawnDir+df;if(valid(s)&&this.board[s]?.c===byColor&&this.board[s]?.t===P)return true;}
    // Knight
    for(const d of KNIGHT_D){const s=sq0+d;if(valid(s)&&this.board[s]?.c===byColor&&this.board[s]?.t===N)return true;}
    // King
    for(const d of KING_D){const s=sq0+d;if(valid(s)&&this.board[s]?.c===byColor&&this.board[s]?.t===K)return true;}
    // Bishops/Queens (diagonals)
    for(const d of SLIDE_DIAG){let s=sq0+d;while(valid(s)){const p=this.board[s];if(p){if(p.c===byColor&&(p.t===Bi||p.t===Q))return true;break;}s+=d;}}
    // Rooks/Queens (orthogonals)
    for(const d of SLIDE_ORTH){let s=sq0+d;while(valid(s)){const p=this.board[s];if(p){if(p.c===byColor&&(p.t===R||p.t===Q))return true;break;}s+=d;}}
    return false;
  }

  _inCheck(color){return this._attacked(this._kingSquare(color),1-color);}

  // Apply move to board, return undo info (does NOT check legality)
  _apply(m){
    const piece=this.board[m.from];
    const captured=this.board[m.to];
    const prevEp=this.ep; const prevCastle={...this.castling};
    const prevHalf=this.halfmove;

    this.board[m.to]=m.promo?{t:m.promo,c:piece.c}:piece;
    this.board[m.from]=null;
    this.ep=null;

    if(m.ep){this.board[m.to+(piece.c===W?-16:16)]=null;}
    if(m.dp)this.ep=m.from+(piece.c===W?16:-16);

    if(m.castle){
      if(m.castle==='WK'){this.board[5]=this.board[7];this.board[7]=null;}
      else if(m.castle==='WQ'){this.board[3]=this.board[0];this.board[0]=null;}
      else if(m.castle==='BK'){this.board[117]=this.board[119];this.board[119]=null;}
      else if(m.castle==='BQ'){this.board[115]=this.board[112];this.board[112]=null;}
    }

    if(piece.t===K){if(piece.c===W){this.castling.WK=false;this.castling.WQ=false;}else{this.castling.BK=false;this.castling.BQ=false;}}
    if(m.from===0||m.to===0)this.castling.WQ=false;
    if(m.from===7||m.to===7)this.castling.WK=false;
    if(m.from===112||m.to===112)this.castling.BQ=false;
    if(m.from===119||m.to===119)this.castling.BK=false;

    this.halfmove=(captured||piece.t===P)?0:this.halfmove+1;
    if(this.turn===B)this.fullmove++;
    this.turn=1-this.turn;

    return{captured,prevEp,prevCastle,prevHalf,piece};
  }

  _undo(m,u){
    this.turn=1-this.turn;
    if(this.turn===B)this.fullmove--;
    const piece=m.promo?{t:P,c:this.turn}:this.board[m.to];
    this.board[m.from]=piece;
    this.board[m.to]=u.captured||null;
    this.ep=u.prevEp; this.castling={...u.prevCastle};
    this.halfmove=u.prevHalf;
    if(m.ep){this.board[m.to+(piece.c===W?-16:16)]={t:P,c:1-piece.c};}
    if(m.castle){
      if(m.castle==='WK'){this.board[7]=this.board[5];this.board[5]=null;}
      else if(m.castle==='WQ'){this.board[0]=this.board[3];this.board[3]=null;}
      else if(m.castle==='BK'){this.board[119]=this.board[117];this.board[117]=null;}
      else if(m.castle==='BQ'){this.board[112]=this.board[115];this.board[115]=null;}
    }
  }

  // Return legal moves as objects {from, to, flags, san, promotion}
  moves(opts){
    const color=this.turn;
    const pseudo=this._genMoves(color);
    const result=[];
    const filterSq=opts?.square?parseSq(opts.square):null;

    for(const m of pseudo){
      if(filterSq!==null&&m.from!==filterSq)continue;
      // Castling: king must not pass through check
      if(m.castle){
        const pass=m.castle==='WK'?[4,5,6]:m.castle==='WQ'?[4,3,2]:m.castle==='BK'?[116,117,118]:[116,115,114];
        if(pass.some(s=>this._attacked(s,1-color)))continue;
      }
      const u=this._apply(m);
      const legal=!this._inCheck(color);
      this._undo(m,u);
      if(!legal)continue;
      result.push(this._mkObj(m));
    }
    return result;
  }

  _mkObj(m){
    let flags='';
    if(m.cap)flags+='c';
    if(m.promo)flags+='p';
    if(m.ep)flags+='e';
    if(m.castle)flags+='k';
    if(m.dp)flags+='b';
    return{from:sqN(m.from),to:sqN(m.to),flags,promotion:m.promo?TYPE_TO_CHAR[m.promo]:null,_raw:m};
  }

  move(obj){
    const from=parseSq(obj.from);
    const to=parseSq(obj.to);
    const promoType=obj.promotion?CHAR_TO_TYPE[obj.promotion.toLowerCase()]:null;
    const pseudo=this._genMoves(this.turn);
    const m=pseudo.find(x=>x.from===from&&x.to===to&&(!x.promo||(x.promo===(promoType||Q))));
    if(!m)return null;
    if(m.castle){
      const pass=m.castle==='WK'?[4,5,6]:m.castle==='WQ'?[4,3,2]:m.castle==='BK'?[116,117,118]:[116,115,114];
      if(pass.some(s=>this._attacked(s,1-this.turn)))return null;
    }
    const u=this._apply(m);
    if(this._inCheck(1-this.turn)){this._undo(m,u);return null;}
    const san=this._san(m);
    this.history.push({m,u,san});
    this._recordPosition();
    return{from:sqN(m.from),to:sqN(m.to),flags:this._mkObj(m).flags,san,promotion:m.promo?TYPE_TO_CHAR[m.promo]:null};
  }

  _san(m){
    const p=this.board[m.to]||(m.promo?{t:m.promo,c:this.turn}:null);
    if(!p)return'?';
    if(m.castle)return m.castle.endsWith('K')?'O-O':'O-O-O';
    const pp=m.promo?{t:P,c:this.turn}:p;
    let s='';
    if(pp.t!==P){
      s+=TYPE_TO_CHAR[pp.t].toUpperCase();
      // Disambig: find other pieces of same type that can also go to m.to
      const others=this._genMoves(pp.c).filter(o=>o.to===m.to&&o.from!==m.from&&this.board[m.from]?.t===pp.t);
      if(others.length){
        if(others.every(o=>fileOf(o.from)!==fileOf(m.from)))s+=FILES[fileOf(m.from)];
        else s+=(rankOf(m.from)+1);
      }
    }
    if(m.cap||m.ep){if(pp.t===P)s+=FILES[fileOf(m.from)];s+='x';}
    s+=sqN(m.to);
    if(m.promo)s+='='+TYPE_TO_CHAR[m.promo].toUpperCase();
    return s;
  }

  isGameOver(){return this.isCheckmate()||this.isStalemate()||this.isInsufficientMaterial()||this.isThreefold()||this.halfmove>=100;}
  isCheckmate(){return this._inCheck(this.turn)&&this.moves().length===0;}
  isStalemate(){return !this._inCheck(this.turn)&&this.moves().length===0;}
  isCheck(){return this._inCheck(this.turn);}
  isDraw(){return this.isStalemate()||this.isInsufficientMaterial()||this.isThreefold()||this.halfmove>=100;}
  isInsufficientMaterial(){
    const ps=[];
    for(let s=0;s<128;s++){if(valid(s)&&this.board[s])ps.push(this.board[s]);}
    if(ps.length===2)return true;
    if(ps.length===3&&ps.some(p=>p.t===N||p.t===Bi))return true;
    return false;
  }
  isThreefold(){
    const key=this._posKey();
    return(this.positionCount[key]||0)>=3;
  }
}

// ═══════════════════════════════════════════════════════════
//  MINIMAX AI  (alpha-beta pruning)
// ═══════════════════════════════════════════════════════════
function evalBoard(chess){
  let score=0;
  for(let s=0;s<128;s++){
    if(!valid(s))continue;
    const p=chess.board[s];
    if(!p)continue;
    const v=TYPE_TO_VAL[p.t]+(PST[p.t]?PST[p.t][pstIdx(s,p.c)]:0);
    score+=p.c===W?v:-v;
  }
  return chess.turn===W?score:-score;
}

function minimax(chess,depth,alpha,beta){
  if(depth===0)return evalBoard(chess);
  const moves=chess.moves();
  if(!moves.length)return chess._inCheck(chess.turn)?-99999:0;
  // order: captures first
  moves.sort((a,b)=>b.flags.includes('c')-a.flags.includes('c'));
  let best=-Infinity;
  for(const mv of moves){
    const u=chess._apply(mv._raw);
    const sc=-minimax(chess,depth-1,-beta,-alpha);
    chess._undo(mv._raw,u);
    if(sc>best){best=sc;}
    if(sc>alpha){alpha=sc;}
    if(alpha>=beta)break;
  }
  return best;
}

const DIFF={easy:{depth:1,rng:0.5,noise:90},normal:{depth:3,rng:0,noise:15},hard:{depth:5,rng:0,noise:0}};

function getBestMove(chess,diff){
  const moves=chess.moves();
  if(!moves.length)return null;
  const cfg=DIFF[diff];
  if(Math.random()<cfg.rng)return moves[Math.floor(Math.random()*moves.length)];
  let best=-Infinity,bestM=moves[0];
  for(const mv of moves){
    const u=chess._apply(mv._raw);
    let sc=-minimax(chess,cfg.depth-1,-Infinity,Infinity);
    chess._undo(mv._raw,u);
    sc+=Math.random()*cfg.noise-cfg.noise/2;
    if(sc>best){best=sc;bestM=mv;}
  }
  return bestM;
}

  game=new Chess(fen);

  isThinking=false;pendingPromo=null;

  const isWhite=playerColor==='white';
  document.getElementById('top-pip').style.background=isWhite?'#222':'#e8d5a0';
  document.getElementById('bot-pip').style.background=isWhite?'#e8d5a0':'#222';
  document.getElementById('top-name').textContent=`Computer (${difficulty[0].toUpperCase()+difficulty.slice(1)})`;
  document.getElementById('bot-name').textContent='You';
  document.getElementById('settings-disp').innerHTML=
    `Playing as <b style="color:var(--cream)">${playerColor}</b><br>Difficulty: <b style="color:var(--cream)">${difficulty}</b>`;

  showScreen('game-screen');
  renderBoard();
  updateMoveList();
  updateEval();
  updateStatus();

  // Computer moves first if needed
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn){
    setTimeout(doComputerMove,500);
  }
}

//  RENDER BOARD
// ═══════════════════════════════════════════════════════════
function renderBoard(){
  const board=document.getElementById('chessboard');
  board.innerHTML='';
  const flipped=playerColor==='black';

  for(let row=0;row<8;row++){
    for(let col=0;col<8;col++){
      const r=flipped?row:7-row;
      const c=flipped?7-col:col;
      const name=FILES[c]+(r+1);
      const isLight=(r+c)%2!==0;

      const div=document.createElement('div');
      div.className='sq '+(isLight?'light':'dark');
      div.dataset.sq=name;

      if(lastMove&&(name===lastMove.from||name===lastMove.to))
        div.classList.add(name===lastMove.from?'last-from':'last-to');
      if(selectedSq===name)div.classList.add('sel');

      const isHint=legalMoves.some(m=>m.to===name);
      if(isHint){
        const s0=sq(c,r);
        if(game.board[s0]){const ring=document.createElement('div');ring.className='cap-ring';div.appendChild(ring);}
        else{div.classList.add('hint');const dot=document.createElement('div');dot.className='move-dot';div.appendChild(dot);}
      }

      // Coordinates
      if(col===0){const sp=document.createElement('span');sp.className='coord rank';sp.textContent=(r+1);div.appendChild(sp);}
      if(row===7){const sp=document.createElement('span');sp.className='coord file';sp.textContent=FILES[c];div.appendChild(sp);}

      // Piece
      const p=game.board[sq(c,r)];
      if(p){
        const el=document.createElement('div');
        el.className='piece';
        el.innerHTML=SVG[pieceKey(p)]||'';
        div.appendChild(el);
      }

      div.addEventListener('click',()=>onSquareClick(name));
      board.appendChild(div);
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════
function onSquareClick(name){
  if(isThinking||pendingPromo||game.isGameOver())return;
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn)return;

  const p=game.board[parseSq(name)];

  if(selectedSq){
    const hit=legalMoves.find(m=>m.to===name);
    if(hit){
      if(hit.flags.includes('p')){pendingPromo={from:selectedSq,to:name};showPromo();return;}
      doPlayerMove(selectedSq,name,'q');
      return;
    }
    if(p&&p.c===playerTurn){selectSq(name);return;}
    selectedSq=null;legalMoves=[];renderBoard();
    return;
  }
  if(p&&p.c===playerTurn)selectSq(name);
}

function selectSq(name){
  selectedSq=name;
  legalMoves=game.moves({square:name});
  renderBoard();
}

function doPlayerMove(from,to,promo){
  const result=game.move({from,to,promotion:promo});
  if(!result)return;
  lastMove={from,to};
  selectedSq=null;legalMoves=[];
  moveHistory.push(result.san);
  pendingPromo=null;
  document.getElementById('promo-overlay').classList.remove('active');
  renderBoard();updateMoveList();updateStatus();updateEval();
  if(game.isGameOver()){setTimeout(showResult,600);return;}
  setTimeout(doComputerMove,300);
}

function doComputerMove(){
  if(game.isGameOver())return;
  const compTurn=playerColor==='white'?B:W;
  if(game.turn!==compTurn)return;
  isThinking=true;updateStatus();
  // Yield to browser to repaint, then compute
  setTimeout(()=>{
    const best=getBestMove(game,difficulty);
    isThinking=false;
    if(!best){updateStatus();return;}
    const result=game.move({from:best.from,to:best.to,promotion:best.promotion||'q'});
    if(result){
      lastMove={from:best.from,to:best.to};
      moveHistory.push(result.san);
      renderBoard();updateMoveList();
    }
    updateStatus();updateEval();
    if(game.isGameOver())setTimeout(showResult,600);
  },30);
}

// ═══════════════════════════════════════════════════════════
//  STATUS / EVAL / MOVES
// ═══════════════════════════════════════════════════════════
function updateStatus(){
  const el=document.getElementById('status-txt');
  if(game.isCheckmate()){el.textContent='Checkmate!';return;}
  if(game.isDraw()){el.textContent='Draw';return;}
  if(isThinking){el.innerHTML='<span style="color:var(--gold)">Computer thinking…</span>';return;}
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn===playerTurn)
    el.textContent=game.isCheck()?'⚠ You are in check!':'Your move';
  else el.textContent="Computer's turn";
}

function updateMoveList(){
  const el=document.getElementById('move-list');el.innerHTML='';
  for(let i=0;i<moveHistory.length;i+=2){
    const pair=document.createElement('div');pair.className='move-pair';
    const num=document.createElement('span');num.className='move-num';num.textContent=(i/2+1)+'.';
    const w=document.createElement('span');w.className='move-san';w.textContent=moveHistory[i]||'';
    const b=document.createElement('span');b.className='move-san';b.style.color='var(--cream-dim)';b.textContent=moveHistory[i+1]||'';
    pair.append(num,w,b);el.appendChild(pair);
  }
  el.scrollTop=el.scrollHeight;
}

function updateEval(){
  let score=0;
  for(let s=0;s<128;s++){
    if(!valid(s))continue;
    const p=game.board[s];
    if(!p)continue;
    score+=p.c===W?TYPE_TO_VAL[p.t]:-TYPE_TO_VAL[p.t];
  }
  const f=score/100;
  const clamped=Math.max(-5,Math.min(5,f));
  const pct=((clamped+5)/10)*100;
  document.getElementById('eval-fill').style.width=pct+'%';
  const lbl=Math.abs(f)>50?(f>0?'+M':'-M'):(f>=0?'+':'')+f.toFixed(1);
  document.getElementById('eval-score').textContent=lbl;
}

// ═══════════════════════════════════════════════════════════
//  PROMOTION
// ═══════════════════════════════════════════════════════════
function showPromo(){
  const color=game.turn;
  const row=document.getElementById('promo-row');row.innerHTML='';
  for(const [type,char] of[[Q,'q'],[R,'r'],[Bi,'b'],[N,'n']]){
    const key=(color===W?'w':'b')+TYPE_TO_CHAR[type].toUpperCase();
    const btn=document.createElement('button');btn.className='promo-btn';
    btn.innerHTML=SVG[key]||'';
    btn.onclick=()=>doPlayerMove(pendingPromo.from,pendingPromo.to,char);
    row.appendChild(btn);
  }
  document.getElementById('promo-overlay').classList.add('active');
}

// ═══════════════════════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════════════════════
function showResult(){
  const playerTurn=playerColor==='white'?W:B;
  const title=document.getElementById('r-title');
  const desc=document.getElementById('r-desc');
  if(game.isCheckmate()){
    const youWin=game.turn!==playerTurn;
    title.textContent=youWin?'🏆 Victory!':'Defeat';
    desc.textContent=(youWin?'You win':'Computer wins')+' by checkmate.';
  } else if(game.isStalemate()){
    title.textContent='Stalemate';desc.textContent='Draw by stalemate.';
  } else if(game.isInsufficientMaterial()){
    title.textContent='Draw';desc.textContent='Insufficient material.';
  } else if(game.isThreefold()){
    title.textContent='Draw';desc.textContent='Threefold repetition.';
  } else {
    title.textContent='Draw';desc.textContent='The game is a draw.';
  }
  document.getElementById('result-overlay').classList.add('active');
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function restartGame(){
  document.getElementById('result-overlay').classList.remove('active');
  const fen=FENS[Math.floor(Math.random()*FENS.length)];
  startGame(fen);
}
function goHome(){
  document.getElementById('result-overlay').classList.remove('active');
  showScreen('home-screen');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

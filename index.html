<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Middlegame Trainer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    #container {
      max-width: 960px;
      width: 100%;
      margin: 20px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      padding: 20px;
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    .form-row {
      margin-bottom: 12px;
    }
    label {
      display: inline-block;
      min-width: 120px;
    }
    select, button {
      padding: 6px 10px;
      font-size: 14px;
    }
    #board {
      width: 480px;
      max-width: 100%;
      margin: 10px auto;
    }
    #status, #fenDisplay, #info {
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
    }
    #controls {
      margin-top: 10px;
      text-align: center;
    }
    #controls button {
      margin: 4px;
    }
    .small {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 6px;
    }
    .error {
      color: #b00020;
    }
  </style>

  <!-- Chessboard.js and dependencies -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css"
        integrity="sha512-VwGmM0fUuFf9Z6v7VGd/POvXB48dF1y5iVr3S9r2Kk94DqO0HXnqT1pEPkNfciqYq7F5kPNgF4buJq3QIV9Wng=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<div id="container">
  <h1>Middlegame Trainer</h1>

  <!-- Home screen -->
  <div id="homeScreen" class="screen active">
    <p style="text-align:center;">
      Generate a neutral middlegame and play against the computer!
    </p>
    <div class="form-row" style="text-align:center;">
      <label for="sideSelect">Play as:</label>
      <select id="sideSelect">
        <option value="white">White</option>
        <option value="black">Black</option>
      </select>
    </div>
    <div class="form-row" style="text-align:center;">
      <label for="difficultySelect">Difficulty:</label>
      <select id="difficultySelect">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <div class="form-row" style="text-align:center;">
      <button id="generateBtn">Generate Middlegame</button>
    </div>
    <p class="small">
      Positions are neutral middlegames around move 12, either from practical games or engine play.
    </p>
    <p id="engineStatus" class="small error"></p>
  </div>

  <!-- Game screen -->
  <div id="gameScreen" class="screen">
    <div id="board"></div>
    <div id="status"></div>
    <div id="fenDisplay" class="small"></div>
    <div id="info" class="small"></div>
    <div id="controls">
      <button id="restartBtn">Restart Position</button>
      <button id="newPosBtn">New Middlegame</button>
      <button id="homeBtn">Return Home</button>
    </div>
  </div>
</div>

<!-- Scripts at end for faster load -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZA2sWyDlzOHi0zG2J4HNc6iYG5YkN6aI2mQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"
        integrity="sha512-+P35IRt+J7hCGw1aC2ACGpDM0Z7p0Vg8J0Tf5VDp3lJydwh7idXJCQnww/bn4fq+FeuYIfdWst2WvO+gB7E9Gg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"
        integrity="sha512-ZN4Sxw+J+Y+kM9G4rotv+hJVKx038kuhSpxq7K2Ae3lJgfA0T4Af4u2xSHKRhsfHH5pTZjexvG5pINPWNv3S3g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
  // Neutral middlegame FENs around move 12 (balanced positions)
  const NEUTRAL_MIDDLEGAMES = [
    "r1bq1rk1/1pp1bppp/p1np1n2/1B2p3/3PP3/2N2N2/PPP2PPP/R1BQ1RK1 w - - 0 10",
    "r1bq1rk1/pp1n1pbp/2p1p1p1/3pP3/3P1P2/2NBB3/PP3NPP/R2Q1RK1 b - - 0 11",
    "r1bq1rk1/1p2bppp/p1n1pn2/2pp4/3P4/1PN1PN2/PB3PPP/R2Q1RK1 w - - 0 11"
  ];

  let game = null;
  let board = null;
  let engine = null;
  let engineReady = false;
  let startingFen = null;
  let playerColor = "white";
  let difficulty = "normal";

  function showScreen(id) {
    document.getElementById("homeScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById(id).classList.add("active");
  }

  function pickRandomFen() {
    const idx = Math.floor(Math.random() * NEUTRAL_MIDDLEGAMES.length);
    return NEUTRAL_MIDDLEGAMES[idx];
  }

  function updateStatus() {
    if (!game) return;
    let status = "";
    let moveColor = game.turn() === "w" ? "White" : "Black";

    if (game.in_checkmate()) {
      status = "Game over, " + (moveColor === "White" ? "Black" : "White") + " wins by checkmate.";
    } else if (game.in_draw()) {
      status = "Game over, drawn position.";
    } else {
      status = moveColor + " to move.";
      if (game.in_check()) {
        status += " " + moveColor + " is in check.";
      }
    }

    document.getElementById("status").textContent = status;
    document.getElementById("fenDisplay").textContent = "FEN: " + game.fen();
  }

  function difficultyToMoveTimeMs(level) {
    if (level === "easy") return 300;
    if (level === "hard") return 2000;
    return 800;
  }

  function initEngine(callback) {
    const statusEl = document.getElementById("engineStatus");
    statusEl.textContent = "Engine initialising…";

    if (engine) {
      try { engine.terminate(); } catch (e) {}
      engine = null;
      engineReady = false;
    }

    try {
      // Stockfish worker from the same repo (stockfish.js in root)
      engine = new Worker("stockfish.js");
    } catch (e) {
      statusEl.textContent = "Could not start Stockfish engine: " + e.message;
      return;
    }

    engine.onmessage = function (event) {
      const line = typeof event.data === "string" ? event.data : "";

      if (line.indexOf("uciok") !== -1) {
        engineReady = true;
        statusEl.textContent = ""; // clear "initialising"
        if (typeof callback === "function") callback();
      }

      if (line.startsWith("bestmove")) {
        const parts = line.split(" ");
        const moveStr = parts[1];
        applyEngineMove(moveStr);
      }
    };

    engine.onerror = function (e) {
      statusEl.textContent = "Engine error: " + e.message;
    };

    // Send UCI init
    engine.postMessage("uci");
  }

  function sendEngineCommand(cmd) {
    if (!engine) return;
    engine.postMessage(cmd);
  }

  function applyEngineMove(uciMove) {
    if (!uciMove || uciMove === "(none)" || !game) return;

    const move = game.move({
      from: uciMove.substring(0, 2),
      to: uciMove.substring(2, 4),
      promotion: uciMove.length > 4 ? uciMove.substring(4, 5) : "q"
    });

    if (move === null) {
      return;
    }

    board.position(game.fen());
    updateStatus();
  }

  function makeEngineMove() {
    if (!engineReady || !game) return;

    const timeMs = difficultyToMoveTimeMs(difficulty);
    const fen = game.fen();

    sendEngineCommand("ucinewgame");
    sendEngineCommand("position fen " + fen);
    sendEngineCommand("go movetime " + timeMs);
  }

  function onDragStart(source, piece, position, orientation) {
    if (!game || game.game_over()) return false;

    if (playerColor === "white" && piece.search(/^b/) !== -1) return false;
    if (playerColor === "black" && piece.search(/^w/) !== -1) return false;

    if ((game.turn() === "w" && playerColor !== "white") ||
        (game.turn() === "b" && playerColor !== "black")) {
      return false;
    }
  }

  function onDrop(source, target) {
    if (!game) return "snapback";

    const move = game.move({
      from: source,
      to: target,
      promotion: "q"
    });

    if (move === null) return "snapback";

    updateStatus();

    if (!game.game_over()) {
      window.setTimeout(makeEngineMove, 250);
    }
  }

  function onSnapEnd() {
    if (!game) return;
    board.position(game.fen());
  }

  function startNewGame(fromFen) {
    startingFen = fromFen || pickRandomFen();
    game = new Chess(startingFen);

    const orientation = playerColor === "white" ? "white" : "black";

    if (!board) {
      board = Chessboard("board", {
        draggable: true,
        position: startingFen,
        orientation: orientation,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
      });
    } else {
      board.orientation(orientation);
      board.position(startingFen, false);
    }

    updateStatus();

    const info = document.getElementById("info");
    info.textContent =
      "Playing as " + playerColor + " | Difficulty: " +
      difficulty.charAt(0).toUpperCase() + difficulty.slice(1) +
      " | Neutral middlegame (≈12 moves).";

    if ((game.turn() === "w" && playerColor === "black") ||
        (game.turn() === "b" && playerColor === "white")) {
      window.setTimeout(makeEngineMove, 400);
    }
  }

  document.getElementById("generateBtn").addEventListener("click", function () {
    playerColor = document.getElementById("sideSelect").value;
    difficulty = document.getElementById("difficultySelect").value;

    const startPlay = function () {
      if (!engineReady) {
        document.getElementById("engineStatus").textContent = "Engine not ready.";
        return;
      }
      startNewGame(pickRandomFen());
      showScreen("gameScreen");
    };

    if (!engine || !engineReady) {
      initEngine(startPlay);
    } else {
      startPlay();
    }
  });

  document.getElementById("restartBtn").addEventListener("click", function () {
    if (!startingFen) return;
    startNewGame(startingFen);
  });

  document.getElementById("newPosBtn").addEventListener("click", function () {
    startNewGame(pickRandomFen());
  });

  document.getElementById("homeBtn").addEventListener("click", function () {
    showScreen("homeScreen");
  });
</script>
</body>
</html>

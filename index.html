<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Middlegame Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg:#0e0c0a; --surface:#1a1714; --surface2:#252118; --border:#3a3328;
  --gold:#c9a84c; --cream:#f2e8d0; --cream-dim:#a89b7e;
  --light-sq:#f0d9b5; --dark-sq:#b58863;
  --sel-l:#f6f669; --sel-d:#baca2b;
  --hint-l:#cdd16f; --hint-d:#aaa23a;
  --last-l:#cdd26a; --last-d:#aaa23a;
  --red:#e04040; --dim:#8a8070;
  --board-size: min(468px, 88vw);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--cream);
  font-family:'DM Mono',monospace;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.05) 0%,transparent 60%),
              radial-gradient(ellipse at 80% 80%,rgba(201,168,76,.03) 0%,transparent 60%);
  pointer-events:none;
}

/* ── SCREENS ── */
.screen { display:none; width:100%; max-width:940px; padding:20px; }
.screen.active { display:flex; flex-direction:column; align-items:center; }

/* ── HOME ── */
.eyebrow { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; text-align:center; }
h1 { font-family:'Playfair Display',serif; font-size:clamp(34px,6vw,58px); font-weight:900; line-height:1; color:var(--cream); text-align:center; letter-spacing:-1px; }
h1 span { color:var(--gold); font-style:italic; }
.subtitle { margin-top:14px; color:var(--cream-dim); font-size:13px; letter-spacing:.5px; line-height:1.7; text-align:center; }
.home-header { margin-bottom:38px; }
.config-panel { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:34px; width:100%; max-width:480px; }
.cfg-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:11px; }
.cfg-group { margin-bottom:24px; }
.toggle-row { display:flex; border:1px solid var(--border); border-radius:3px; overflow:hidden; }
.toggle-btn { flex:1; padding:12px 0; background:transparent; border:none; color:var(--cream-dim); font-family:'DM Mono',monospace; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.toggle-btn.active { background:var(--gold); color:var(--bg); font-weight:500; }
.toggle-btn:not(.active):hover { background:var(--surface2); color:var(--cream); }
.diff-row { display:flex; gap:8px; }
.diff-btn { flex:1; padding:12px 8px; background:transparent; border:1px solid var(--border); border-radius:3px; color:var(--cream-dim); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.diff-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.06); }
.diff-btn:not(.active):hover { border-color:var(--cream-dim); color:var(--cream); }
.gen-btn { width:100%; padding:16px; background:var(--gold); border:none; border-radius:3px; color:var(--bg); font-family:'Playfair Display',serif; font-size:18px; font-weight:700; cursor:pointer; transition:all .2s; margin-top:4px; }
.gen-btn:hover { background:var(--cream); transform:translateY(-1px); }
.gen-btn:active { transform:translateY(0); }

/* ── GAME ── */
#game-screen { flex-direction:column; gap:14px; }
.topbar { width:100%; display:flex; justify-content:space-between; align-items:center; padding:0 2px; flex-wrap:wrap; gap:8px; }
.logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold); font-style:italic; }
.topbar-btns { display:flex; gap:6px; flex-wrap:wrap; }
.top-btn {
  padding:7px 13px; background:transparent; border:1px solid var(--border); border-radius:3px;
  color:var(--cream-dim); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.top-btn:hover { border-color:var(--gold); color:var(--gold); }
.top-btn.active-toggle { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
.top-btn.danger:hover { border-color:var(--red); color:var(--red); }

/* ── GAME LAYOUT ── */
.game-layout { display:flex; gap:20px; align-items:flex-start; width:100%; justify-content:center; }
.board-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
.player-lbl { display:flex; align-items:center; gap:9px; font-size:12px; letter-spacing:1px; color:var(--cream-dim); padding:0 2px; }
.pip { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1px solid rgba(255,255,255,.15); display:inline-block; }

/* ── BOARD ── */
#chessboard {
  display:grid;
  grid-template-columns: repeat(8, calc(var(--board-size) / 8));
  grid-template-rows:    repeat(8, calc(var(--board-size) / 8));
  width:  var(--board-size);
  height: var(--board-size);
  border:2px solid var(--border);
  border-radius:2px;
  overflow:hidden;
  user-select:none;
  /* Prevent any layout reflow from resizing the board */
  flex-shrink:0;
}
.sq {
  position:relative;
  width:  calc(var(--board-size) / 8);
  height: calc(var(--board-size) / 8);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; overflow:hidden;
}
.sq.light { background:var(--light-sq); }
.sq.dark  { background:var(--dark-sq); }
.sq.sel        { background:var(--sel-l) !important; }
.sq.sel.dark   { background:var(--sel-d) !important; }
.sq.last-from.light, .sq.last-to.light { background:var(--last-l); }
.sq.last-from.dark,  .sq.last-to.dark  { background:var(--last-d); }
.sq.hint.light { background:var(--hint-l); }
.sq.hint.dark  { background:var(--hint-d); }

.coord {
  position:absolute; font-size:9px; font-family:'DM Mono',monospace;
  font-weight:500; line-height:1; pointer-events:none; color:rgba(0,0,0,.28);
}
.sq.dark .coord { color:rgba(255,255,255,.22); }
.coord.file { bottom:2px; right:3px; }
.coord.rank { top:2px; left:3px; }

/* ── PIECES ── */
.piece {
  width:88%; height:88%;
  pointer-events:none;
  position:relative; z-index:2;
  /* Critical: no flex/transform that might duplicate rendering */
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.piece svg { width:100%; height:100%; display:block; pointer-events:none; }

/* When dragging: hide piece on origin square (ghost replaces it) */
.sq.dragging-from > .piece { visibility:hidden; }

/* move hints */
.move-dot { width:30%; height:30%; border-radius:50%; background:rgba(0,0,0,.18); pointer-events:none; position:absolute; z-index:1; }
.cap-ring { width:88%; height:88%; border-radius:50%; border:4px solid rgba(0,0,0,.2); pointer-events:none; position:absolute; z-index:1; }

/* ── DRAG GHOST ── */
/* The ghost is a fixed-position clone that follows the pointer */
#drag-ghost {
  position:fixed;
  pointer-events:none;
  z-index:9999;
  display:none;
  width:  calc(var(--board-size) / 8);
  height: calc(var(--board-size) / 8);
  transform:translate(-50%,-50%);
  opacity:.95;
}
#drag-ghost svg { width:100%; height:100%; display:block; }

/* ── SIDEBAR ── */
.sidebar { width:205px; display:flex; flex-direction:column; gap:13px; padding-top:2px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:13px; }
.card-title { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:9px; }
.status-txt { font-size:13px; color:var(--cream); line-height:1.6; min-height:36px; }

/* eval — hidden by default, entire block hidden */
.eval-wrap { transition:opacity .3s; }
.eval-wrap.eval-hidden { opacity:0; pointer-events:none; }
.eval-row { display:flex; align-items:center; gap:8px; }
.eval-bar { flex:1; height:8px; background:#111; border-radius:4px; overflow:hidden; border:1px solid var(--border); }
.eval-fill { height:100%; background:var(--cream); border-radius:4px; transition:width .4s ease; width:50%; }
.eval-score { font-size:11px; color:var(--cream-dim); width:38px; text-align:right; }

/* move list */
.move-list { max-height:210px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
.move-list::-webkit-scrollbar { width:4px; }
.move-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.move-pair { display:grid; grid-template-columns:20px 1fr 1fr; gap:4px; align-items:center; font-size:12px; padding:2px 4px; border-radius:2px; }
.move-pair:hover { background:var(--surface2); }
.move-num { color:var(--dim); font-size:10px; }
.move-san { color:var(--cream); padding:2px 3px; border-radius:2px; }

/* ── OVERLAYS / MODALS ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; align-items:center; justify-content:center; }
.overlay.active { display:flex; }

/* promotion */
.modal { background:var(--surface); border:1px solid var(--gold); border-radius:4px; padding:28px; text-align:center; }
.modal h3 { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); margin-bottom:16px; }
.promo-row { display:flex; gap:12px; justify-content:center; }
.promo-btn { width:62px; height:62px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
.promo-btn:hover { border-color:var(--gold); }
.promo-btn svg { width:52px; height:52px; display:block; }

/* result */
.result-box { background:var(--surface); border:1px solid var(--gold); border-radius:4px; padding:38px 46px; text-align:center; max-width:340px; }
.result-box h2 { font-family:'Playfair Display',serif; font-size:34px; font-weight:900; color:var(--gold); margin-bottom:8px; }
.result-box p { color:var(--cream-dim); font-size:13px; margin-bottom:26px; line-height:1.6; }
.result-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.r-btn { padding:10px 20px; border-radius:3px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:opacity .2s; border:1px solid var(--border); background:transparent; color:var(--cream); }
.r-btn.primary { background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:500; }
.r-btn:hover { opacity:.82; }

/* ── NEW GAME MODAL ── */
.ng-box {
  background:var(--surface); border:1px solid var(--gold); border-radius:4px;
  padding:32px 36px; text-align:center; max-width:400px; width:90%;
}
.ng-box h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:900; color:var(--gold); margin-bottom:24px; }
.ng-box .cfg-label { text-align:left; }
.ng-box .cfg-group { margin-bottom:20px; }
.ng-close { position:absolute; top:12px; right:16px; background:transparent; border:none; color:var(--cream-dim); font-size:20px; cursor:pointer; line-height:1; }
.ng-close:hover { color:var(--cream); }
.ng-box-inner { position:relative; }

/* ── RESIGN BUTTON ── */
.board-wrap { position:relative; }
.resign-btn {
  position:absolute; bottom:28px; right:-42px;
  width:34px; height:34px;
  background:var(--surface); border:1px solid var(--border); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:border-color .15s, background .15s;
  font-size:16px; line-height:1; z-index:10;
}
.resign-btn:hover { border-color:var(--red); background:rgba(224,64,64,.08); }
.resign-btn:disabled { opacity:.35; cursor:default; pointer-events:none; }

/* ── RESIGN CONFIRM POPUP ── */
.resign-confirm {
  display:none; position:fixed; z-index:500;
  background:var(--surface); border:1px solid var(--red); border-radius:6px;
  padding:14px 18px; box-shadow:0 8px 32px rgba(0,0,0,.7);
  min-width:152px; text-align:center;
}
.resign-confirm.active { display:block; }
.resign-confirm p { font-size:12px; letter-spacing:.5px; color:var(--cream); margin-bottom:12px; white-space:nowrap; }
.resign-confirm-btns { display:flex; gap:8px; justify-content:center; }
.rc-btn {
  padding:6px 14px; border-radius:3px; border:1px solid var(--border);
  background:transparent; color:var(--cream-dim);
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:all .15s;
}
.rc-btn.yes { border-color:var(--red); color:var(--red); }
.rc-btn.yes:hover { background:var(--red); color:#fff; }
.rc-btn.no:hover  { border-color:var(--cream); color:var(--cream); }

@media(max-width:680px) {
  .game-layout { flex-direction:column; align-items:center; }
  .sidebar { width:var(--board-size); flex-direction:row; flex-wrap:wrap; }
  .card { flex:1; min-width:130px; }
  .resign-btn { right:-38px; }
}
</style>
</head>
<body>

<!-- ═══ HOME SCREEN ═══ -->
<div id="home-screen" class="screen active">
  <div class="home-header">
    <div class="eyebrow">Chess Trainer</div>
    <h1>Middlegame<br><span>Battleground</span></h1>
    <p class="subtitle">Step into balanced, equal positions and<br>prove your middlegame mastery.</p>
  </div>
  <div class="config-panel">
    <div class="cfg-group">
      <div class="cfg-label">Play as</div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-color="white" onclick="homeSelectColor('white')">♔ White</button>
        <button class="toggle-btn"        data-color="black" onclick="homeSelectColor('black')">♚ Black</button>
      </div>
    </div>
    <div class="cfg-group">
      <div class="cfg-label">Difficulty</div>
      <div class="diff-row">
        <button class="diff-btn active" data-diff="easy"   onclick="homeSelectDiff('easy')">Easy</button>
        <button class="diff-btn"        data-diff="normal" onclick="homeSelectDiff('normal')">Normal</button>
        <button class="diff-btn"        data-diff="hard"   onclick="homeSelectDiff('hard')">Hard</button>
      </div>
    </div>
    <button class="gen-btn" onclick="homeGenerate()">Generate Middlegame →</button>
  </div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen">
  <div class="topbar">
    <div class="logo">Middlegame</div>
    <div class="topbar-btns">
      <button class="top-btn active-toggle" id="btn-hints" onclick="toggleHints()">Hide Moves</button>
      <button class="top-btn" id="btn-eval"  onclick="toggleEval()">Show Eval</button>
      <button class="top-btn"                onclick="restartGame()">↺ Restart</button>
      <button class="top-btn"                onclick="openNewGame()">＋ New Game</button>
      <button class="top-btn danger"         onclick="goHome()">⌂ Home</button>
    </div>
  </div>

  <div class="game-layout">
    <div class="board-wrap">
      <div class="player-lbl"><span class="pip" id="top-pip"></span>&nbsp;<span id="top-name">Computer</span></div>
      <div id="chessboard"></div>
      <div class="player-lbl"><span class="pip" id="bot-pip"></span>&nbsp;<span id="bot-name">You</span></div>
      <button class="resign-btn" id="resign-btn" onclick="onResignClick(event)" title="Resign">🏳</button>
    </div>
    <div class="sidebar">
      <div class="card">
        <div class="card-title">Status</div>
        <div class="status-txt" id="status-txt">Your move</div>
      </div>
      <div class="card">
        <div class="card-title">Evaluation</div>
        <div class="eval-wrap eval-hidden" id="eval-wrap">
          <div class="eval-row">
            <div class="eval-bar"><div class="eval-fill" id="eval-fill"></div></div>
            <div class="eval-score" id="eval-score">+0.0</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Move History</div>
        <div class="move-list" id="move-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PROMOTION MODAL ═══ -->
<div class="overlay" id="promo-overlay">
  <div class="modal">
    <h3>Promote Pawn</h3>
    <div class="promo-row" id="promo-row"></div>
  </div>
</div>

<!-- ═══ RESULT MODAL ═══ -->
<div class="overlay" id="result-overlay">
  <div class="result-box">
    <h2 id="r-title">Game Over</h2>
    <p  id="r-desc">—</p>
    <div class="result-btns">
      <button class="r-btn primary" onclick="restartGame()">↺ Restart</button>
      <button class="r-btn"         onclick="openNewGameFromResult()">＋ New Game</button>
      <button class="r-btn"         onclick="goHome()">⌂ Home</button>
    </div>
  </div>
</div>

<!-- ═══ NEW GAME MODAL ═══ -->
<div class="overlay" id="ng-overlay">
  <div class="ng-box">
    <div class="ng-box-inner">
      <button class="ng-close" onclick="closeNewGame()">✕</button>
      <h2>New Game</h2>
      <div class="cfg-group">
        <div class="cfg-label">Play as</div>
        <div class="toggle-row">
          <button class="toggle-btn active" data-ng-color="white" onclick="ngSelectColor('white')">♔ White</button>
          <button class="toggle-btn"        data-ng-color="black" onclick="ngSelectColor('black')">♚ Black</button>
        </div>
      </div>
      <div class="cfg-group">
        <div class="cfg-label">Difficulty</div>
        <div class="diff-row">
          <button class="diff-btn active" data-ng-diff="easy"   onclick="ngSelectDiff('easy')">Easy</button>
          <button class="diff-btn"        data-ng-diff="normal" onclick="ngSelectDiff('normal')">Normal</button>
          <button class="diff-btn"        data-ng-diff="hard"   onclick="ngSelectDiff('hard')">Hard</button>
        </div>
      </div>
      <button class="gen-btn" onclick="ngGenerate()">Generate Middlegame →</button>
    </div>
  </div>
</div>

<!-- ═══ RESIGN CONFIRM POPUP ═══ -->
<div class="resign-confirm" id="resign-confirm">
  <p>Resign the game?</p>
  <div class="resign-confirm-btns">
    <button class="rc-btn yes" onclick="confirmResign()">Yes</button>
    <button class="rc-btn no"  onclick="closeResignConfirm()">No</button>
  </div>
</div>

<!-- ═══ DRAG GHOST ═══ -->
<div id="drag-ghost"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
//  CHESS ENGINE  (0x88 board, full legal move generation)
// ════════════════════════════════════════════════════════════
const W=1, B=0;
const P=1, N=2, Bi=3, R=4, Q=5, K=6;
const FILES='abcdefgh';

const sq      = (f,r) => r*16+f;
const fileOf  = s => s & 7;
const rankOf  = s => s >> 4;
const sqN     = s => FILES[fileOf(s)] + (rankOf(s)+1);
const parseSq = n => sq(FILES.indexOf(n[0]), parseInt(n[1])-1);
const valid   = s => !(s & 0x88);

const CHAR_TO_TYPE = {p:P,n:N,b:Bi,r:R,q:Q,k:K};
const TYPE_TO_CHAR = [,'p','n','b','r','q','k'];
const TYPE_TO_VAL  = [,100,320,330,500,900,20000];

const SLIDE_DIAG = [-17,-15,15,17];
const SLIDE_ORTH = [-16,-1,1,16];
const SLIDE_ALL  = [...SLIDE_DIAG,...SLIDE_ORTH];
const KNIGHT_D   = [-33,-31,-18,-14,14,18,31,33];
const KING_D     = SLIDE_ALL;

const PST = {
  [P] :[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
  [N] :[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
  [Bi]:[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
  [R] :[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],
  [Q] :[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],

function evalBoard(chess){
  let score=0;
  for(let s=0;s<128;s++){if(!valid(s))continue;const p=chess.board[s];if(!p)continue;const v=TYPE_TO_VAL[p.t]+(PST[p.t]?PST[p.t][pstIdx(s,p.c)]:0);score+=p.c===W?v:-v;}
  return chess.turn===W?score:-score;
}
function minimax(chess,depth,alpha,beta){
  if(depth===0)return evalBoard(chess);
  const moves=chess.moves();
  if(!moves.length)return chess._inCheck(chess.turn)?-99999:0;
  moves.sort((a,b)=>b.flags.includes('c')-a.flags.includes('c'));
  let best=-Infinity;
  for(const mv of moves){const u=chess._apply(mv._raw);const sc=-minimax(chess,depth-1,-beta,-alpha);chess._undo(mv._raw,u);if(sc>best)best=sc;if(sc>alpha)alpha=sc;if(alpha>=beta)break;}
  return best;
}
const DIFF={easy:{depth:1,rng:.5,noise:90},normal:{depth:3,rng:0,noise:15},hard:{depth:5,rng:0,noise:0}};
function getBestMove(chess,diff){
  const moves=chess.moves();if(!moves.length)return null;
  const cfg=DIFF[diff];if(Math.random()<cfg.rng)return moves[Math.floor(Math.random()*moves.length)];
  let bestScore=-Infinity,bestM=moves[0];
  for(const mv of moves){const u=chess._apply(mv._raw);let sc=-minimax(chess,cfg.depth-1,-Infinity,Infinity);chess._undo(mv._raw,u);sc+=Math.random()*cfg.noise-cfg.noise/2;if(sc>bestScore){bestScore=sc;bestM=mv;}}
  return bestM;
}

// ════════════════════════════════════════════════════════════
//  PROCEDURAL POSITION GENERATOR
//  Plays out a realistic pseudo-random opening/middlegame
//  using a weighted opening book + heuristic move selection.
//  Produces a unique position every time — no fixed list.
//  25 curated FENs are kept as a fallback only.
// ════════════════════════════════════════════════════════════

// ── Opening book: [from, to, weight] triples ──
// Higher weight = more likely to be chosen.
// Covers all major first moves and common replies up to ply 8.
const BOOK = {
  // key = position hash of piece placement (simplified: just move number + last moves)
  // We use a flat weighted list per ply instead of a tree, for simplicity.
  // Format: [ply, from, to, weight]  (ply 0 = White's first move)
  0: [ // White's 1st move
    ['e2','e4',40], ['d2','d4',35], ['c2','c4',15], ['g1','f3',8], ['b1','c3',2]
  ],
  1: [ // Black's 1st move (after e4)
    ['e7','e5',30], ['c7','c5',28], ['e7','e6',15], ['c7','c6',12],
    ['g8','f6',8],  ['d7','d6',5],  ['d7','d5',2]
  ],
  1.1: [ // Black after d4
    ['d7','d5',30], ['g8','f6',28], ['e7','e6',15], ['c7','c5',12],
    ['f7','f5',5],  ['c7','c6',10]
  ],
  1.2: [ // Black after c4
    ['e7','e5',20], ['g8','f6',25], ['c7','c5',20], ['e7','e6',20], ['c7','c6',15]
  ],
  1.3: [ // Black after Nf3
    ['d7','d5',30], ['g8','f6',25], ['c7','c5',20], ['e7','e6',15], ['d7','d6',10]
  ],
};

// Comprehensive book of sensible moves by piece type and situation
// These are used after the opening book runs out (ply 8+)
// to guide move selection toward realistic middlegame play.

function generatePosition() {
  // Try up to 8 times to get a good position
  for (let attempt = 0; attempt < 8; attempt++) {
    const fen = _tryGenerate();
    if (fen) return fen;
  }
  // Fallback to a curated position
  return FALLBACK_FENS[Math.floor(Math.random() * FALLBACK_FENS.length)];
}

function _tryGenerate() {
  const gen = new Chess('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');

  // Target: stop between move 10 and 22, with a random distribution
  // weighted toward 12-17 (true middlegame)
  const targetPly = _randRange(20, 40); // plies (half-moves)

  // Track opening context for book lookups
  let lastWhite = '', lastBlack = '', plyCount = 0;
  let openingChoice = ''; // 'e4','d4','c4','nf3' etc

  for (let ply = 0; ply < targetPly; ply++) {
    if (gen.isGameOver()) return null; // abandoned position

    const moves = gen.moves();
    if (!moves.length) return null;

    let chosen = null;

    // ── Phase 1: Opening book (plies 0-7) ──
    if (ply <= 7) {
      chosen = _bookMove(gen, ply, openingChoice, lastWhite, lastBlack);
      if (ply === 0 && chosen) openingChoice = chosen.to; // remember e4/d4 etc
      if (ply === 1 && chosen) lastBlack = chosen.to;
      if (ply === 2 && chosen) lastWhite = chosen.to;
    }

    // ── Phase 2: Heuristic development (plies 8-19) ──
    if (!chosen && ply <= 19) {
      chosen = _heuristicMove(gen, ply, moves);
    }

    // ── Phase 3: Random with pruning (plies 20+) ──
    if (!chosen) {
      chosen = _prunedRandom(gen, moves);
    }

    if (!chosen) chosen = moves[Math.floor(Math.random() * moves.length)];

    const result = gen.move({ from: chosen.from, to: chosen.to, promotion: chosen.promotion || 'q' });
    if (!result) {
      // move failed, pick random
      const fallback = moves[Math.floor(Math.random() * moves.length)];
      gen.move({ from: fallback.from, to: fallback.to, promotion: 'q' });
    }
    plyCount++;
  }

  // Validate the generated position
  if (!_isAcceptablePosition(gen)) return null;

  return _toFen(gen);
}

function _bookMove(gen, ply, openingChoice, lastWhite, lastBlack) {
  // Ply 0: white's first move
  if (ply === 0) return _weighted(BOOK[0]);

  // Ply 1: black replies based on white's first move
  if (ply === 1) {
    const book = openingChoice === 'e4' ? BOOK[1] :
                 openingChoice === 'd4' ? BOOK[1.1] :
                 openingChoice === 'c4' ? BOOK[1.2] : BOOK[1.3];
    return _weighted(book || BOOK[1]);
  }

  // Plies 2-7: use sensible piece development book
  return _developmentBook(gen, ply);
}

function _developmentBook(gen, ply) {
  const color = gen.turn;
  const moves = gen.moves();
  const board = gen.board;

  // Priority order: castle if possible, develop knights/bishops,
  // push central pawns, connect rooks
  const scored = moves.map(m => {
    let score = Math.random() * 20; // base randomness
    const from = parseSq(m.from), to = parseSq(m.to);
    const piece = board[from];
    if (!piece) return { m, score };

    const toFile = fileOf(to), toRank = rankOf(to);
    const fromFile = fileOf(from), fromRank = rankOf(from);

    // Castling: very high priority if not yet castled
    if (m.flags.includes('k') || m.flags.includes('k')) score += 80;

    // Develop knights to good squares
    if (piece.t === N) {
      if (color === W && fromRank === 0) score += 50; // develop from back rank
      if (color === B && fromRank === 7) score += 50;
      // Good knight squares: f3,c3,f6,c6,d4,d5,e4,e5
      if ([2,3,4,5].includes(toFile) && [2,3,4,5].includes(toRank)) score += 30;
    }

    // Develop bishops
    if (piece.t === Bi) {
      if (color === W && fromRank === 0) score += 45;
      if (color === B && fromRank === 7) score += 45;
      // Active diagonals
      if ([2,3,4,5].includes(toFile)) score += 20;
    }

    // Central pawn pushes (e,d files, ranks 3-4 for white, 4-5 for black)
    if (piece.t === P) {
      if ([3,4].includes(toFile)) { // d,e files
        if (color === W && toRank >= 3) score += 40;
        if (color === B && toRank <= 4) score += 40;
      }
      // Don't push flank pawns early
      if ([0,7].includes(toFile) && ply < 6) score -= 20;
    }

    // Don't move queen early
    if (piece.t === Q && ply < 6) score -= 40;

    // Don't move rooks before castling (check if castling rights exist)
    if (piece.t === R && ply < 8) score -= 30;

    // Captures are generally good
    if (m.flags.includes('c')) score += 25;

    return { m, score };
  });

  scored.sort((a, b) => b.score - a.score);
  // Pick from top 3 with weighted randomness
  const pool = scored.slice(0, Math.min(4, scored.length));
  const total = pool.reduce((s, x) => s + Math.max(0, x.score), 0);
  if (total <= 0) return pool[0]?.m || null;
  let r = Math.random() * total;
  for (const { m, score } of pool) {
    r -= Math.max(0, score);
    if (r <= 0) return m;
  }
  return pool[0]?.m || null;
}

function _heuristicMove(gen, ply, moves) {
  // After opening: maintain sensible play
  // Avoid clearly bad moves, prefer active pieces
  const board = gen.board;
  const color = gen.turn;

  const scored = moves.map(m => {
    let score = Math.random() * 30;
    const from = parseSq(m.from), to = parseSq(m.to);
    const piece = board[from];
    if (!piece) return { m, score };

    const toFile = fileOf(to), toRank = rankOf(to);

    // Captures are generally good
    if (m.flags.includes('c')) {
      const captured = board[to];
      if (captured) score += TYPE_TO_VAL[captured.t] / 20;
      score += 20;
    }

    // Castling still good if haven't done it
    if (m.flags.includes('k') || m.flags.includes('q')) score += 60;

    // Central control
    if ([3,4].includes(toFile) && [3,4].includes(toRank)) score += 15;

    // Knight on rim is dim
    if (piece.t === N && ([0,7].includes(toFile) || (color===W?toRank<=1:toRank>=6))) score -= 25;

    // Don't shuffle already developed pieces too much
    if (piece.t !== P && piece.t !== K) {
      const homeRank = color === W ? 0 : 7;
      if (rankOf(from) !== homeRank) score -= 5; // slight penalty for re-moving
    }

    // Pawn advances
    if (piece.t === P) {
      if (color === W && toRank >= 4) score += 10;
      if (color === B && toRank <= 3) score += 10;
    }

    return { m, score };
  });

  scored.sort((a, b) => b.score - a.score);
  const pool = scored.slice(0, Math.min(5, scored.length));
  const total = pool.reduce((s, x) => s + Math.max(1, x.score), 0);
  let r = Math.random() * total;
  for (const { m, score } of pool) {
    r -= Math.max(1, score);
    if (r <= 0) return m;
  }
  return pool[0]?.m || null;
}

function _prunedRandom(gen, moves) {
  // Fully random but filter out completely absurd moves
  const board = gen.board;
  const color = gen.turn;
  const filtered = moves.filter(m => {
    const from = parseSq(m.from);
    const piece = board[from];
    if (!piece) return true;
    // Don't move king to centre in middlegame
    if (piece.t === K && !m.flags.includes('k') && !m.flags.includes('q')) {
      const to = parseSq(m.to);
      if ([3,4].includes(fileOf(to)) && [2,3,4,5].includes(rankOf(to))) return false;
    }
    return true;
  });
  const pool = filtered.length ? filtered : moves;
  return pool[Math.floor(Math.random() * pool.length)];
}

function _weighted(list) {
  if (!list || !list.length) return null;
  const total = list.reduce((s, x) => s + x[2], 0);
  let r = Math.random() * total;
  for (const [from, to, weight] of list) {
    r -= weight;
    if (r <= 0) return { from, to };
  }
  return { from: list[0][0], to: list[0][1] };
}

function _randRange(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function _isAcceptablePosition(gen) {
  if (gen.isGameOver()) return false;
  if (gen.isCheck()) return false; // don't start in check

  // Count material imbalance — reject if too lopsided (>9 pawn equivalents)
  let score = 0;
  for (let s = 0; s < 128; s++) {
    if (!valid(s)) continue;
    const p = gen.board[s];
    if (!p || p.t === K) continue;
    score += p.c === W ? TYPE_TO_VAL[p.t] : -TYPE_TO_VAL[p.t];
  }
  if (Math.abs(score) > 900) return false; // more than a minor piece imbalance

  // Must have at least 10 total pieces (not too simplified)
  let total = 0;
  for (let s = 0; s < 128; s++) {
    if (valid(s) && gen.board[s]) total++;
  }
  if (total < 10) return false;

  // Must have legal moves available
  if (gen.moves().length < 5) return false;

  return true;
}

function _toFen(gen) {
  // Reconstruct FEN string from the Chess object
  const board = gen.board;
  let fen = '';
  for (let r = 7; r >= 0; r--) {
    let empty = 0;
    for (let f = 0; f < 8; f++) {
      const p = board[sq(f, r)];
      if (!p) { empty++; continue; }
      if (empty) { fen += empty; empty = 0; }
      const ch = TYPE_TO_CHAR[p.t];
      fen += p.c === W ? ch.toUpperCase() : ch;
    }
    if (empty) fen += empty;
    if (r > 0) fen += '/';
  }
  fen += ' ' + (gen.turn === W ? 'w' : 'b');
  let castle = '';
  if (gen.castling.WK) castle += 'K';
  if (gen.castling.WQ) castle += 'Q';
  if (gen.castling.BK) castle += 'k';
  if (gen.castling.BQ) castle += 'q';
  fen += ' ' + (castle || '-');
  fen += ' ' + (gen.ep !== null ? sqN(gen.ep) : '-');
  fen += ' ' + gen.halfmove + ' ' + gen.fullmove;
  return fen;
}

// ── Fallback curated positions (used only if generation fails) ──
const FALLBACK_FENS = [
  "r1bq1rk1/2p1bppp/p1np1n2/1p2p3/3PP3/1BP2N2/PP3PPP/RNBQR1K1 w - - 0 11",
  "r1b2rk1/1p2bppp/p1n1pn2/q1pp4/3P1B2/2NBPN2/PP3PPP/R2QK2R w KQ - 2 11",
  "r1bq1rk1/ppp2pbp/2np1np1/4p3/2PPP3/2N2N2/PP2BPPP/R1BQK2R w KQ - 0 9",
  "r2q1rk1/ppp1bppp/2np1n2/4p3/2PPP3/2N2N2/PP2BPPP/R1BQR1K1 w - - 1 10",
  "r1bq1rk1/1p2bppp/p1np1n2/4p3/2P1P3/2NP1N2/PP2BPPP/R1BQR1K1 w - - 0 11",
  "r2q1rk1/pp2ppbp/2p2np1/3p1b2/2PP4/2N1PN2/PP2BPPP/R1BQK2R w KQ - 2 10",
  "r2qr1k1/pp2bppp/2n1pn2/3p4/3P4/2NBPN2/PP3PPP/R2QR1K1 w - - 2 13",
  "2r1r1k1/pp1q1ppp/2np1n2/2b1p3/2B1P3/2NP1N2/PP1Q1PPP/R3R1K1 w - - 3 14",
  "r2q1rk1/pp1b1ppp/2nbpn2/3p4/2PP4/2N1PN2/PPB2PPP/R1BQR1K1 w - - 2 12",
  "r4rk1/ppp2ppp/2np1n2/4p3/4P3/2NP1N2/PPP2PPP/R4RK1 w - - 0 13",
];

//  GAME STATE
// ════════════════════════════════════════════════════════════
let game=null, playerColor='white', difficulty='easy';
let currentFen='';           // FEN of the starting position (for Restart)
let selectedSq=null, legalMoves=[], lastMove=null, moveHistory=[];
let isThinking=false, pendingPromo=null;
let showHints=true, showEval=false;  // hints ON by default

// New-game modal pending selections
let ngColor='white', ngDiff='easy';

// ════════════════════════════════════════════════════════════
//  HOME SCREEN CONTROLS
// ════════════════════════════════════════════════════════════
function homeSelectColor(c){
  playerColor=c;
  document.querySelectorAll('[data-color]').forEach(b=>b.classList.toggle('active',b.dataset.color===c));
}
function homeSelectDiff(d){
  difficulty=d;
  document.querySelectorAll('[data-diff]').forEach(b=>b.classList.toggle('active',b.dataset.diff===d));
}
function homeGenerate(){
  const fen=generatePosition();
  startGame(fen, playerColor, difficulty);
}

// ════════════════════════════════════════════════════════════
//  TOGGLE BUTTONS (in-game)
// ════════════════════════════════════════════════════════════
function toggleHints(){
  showHints=!showHints;
  const btn=document.getElementById('btn-hints');
  btn.textContent=showHints?'Hide Moves':'Show Moves';
  btn.classList.toggle('active-toggle',showHints);
  if(game) renderBoard();
}
function toggleEval(){
  showEval=!showEval;
  const btn=document.getElementById('btn-eval');
  btn.textContent=showEval?'Hide Eval':'Show Eval';
  btn.classList.toggle('active-toggle',showEval);
  document.getElementById('eval-wrap').classList.toggle('eval-hidden',!showEval);
}

// ════════════════════════════════════════════════════════════
//  NEW GAME MODAL
// ════════════════════════════════════════════════════════════
function openNewGame(){
  // Sync modal to current settings as defaults
  ngColor=playerColor; ngDiff=difficulty;
  _syncNgButtons();
  document.getElementById('ng-overlay').classList.add('active');
}
function openNewGameFromResult(){
  document.getElementById('result-overlay').classList.remove('active');
  openNewGame();
}
function closeNewGame(){
  document.getElementById('ng-overlay').classList.remove('active');
}
function ngSelectColor(c){
  ngColor=c;
  document.querySelectorAll('[data-ng-color]').forEach(b=>b.classList.toggle('active',b.dataset.ngColor===c));
}
function ngSelectDiff(d){
  ngDiff=d;
  document.querySelectorAll('[data-ng-diff]').forEach(b=>b.classList.toggle('active',b.dataset.ngDiff===d));
}
function ngGenerate(){
  document.getElementById('ng-overlay').classList.remove('active');
  const fen=generatePosition();
  startGame(fen, ngColor, ngDiff);
}
function _syncNgButtons(){
  document.querySelectorAll('[data-ng-color]').forEach(b=>b.classList.toggle('active',b.dataset.ngColor===ngColor));
  document.querySelectorAll('[data-ng-diff]').forEach(b=>b.classList.toggle('active',b.dataset.ngDiff===ngDiff));
}
// Close new-game modal if backdrop clicked
document.getElementById('ng-overlay').addEventListener('click', function(e){
  if(e.target===this) closeNewGame();
});

// ════════════════════════════════════════════════════════════
//  START GAME
// ════════════════════════════════════════════════════════════
function startGame(fen, color, diff){
  currentFen = fen;          // save for Restart
  playerColor = color;
  difficulty  = diff;

  game=new Chess(fen);
  selectedSq=null; legalMoves=[]; lastMove=null; moveHistory=[];
  isThinking=false; pendingPromo=null;

  // Reset toggles — hints ON by default, eval OFF
  showHints=true; showEval=false;
  document.getElementById('btn-hints').textContent='Hide Moves';
  document.getElementById('btn-hints').classList.add('active-toggle');
  document.getElementById('btn-eval').textContent='Show Eval';
  document.getElementById('btn-eval').classList.remove('active-toggle');
  document.getElementById('eval-wrap').classList.add('eval-hidden');

  // Player labels
  const isWhite=playerColor==='white';
  document.getElementById('top-pip').style.background=isWhite?'#1e1e1e':'#e8d5a0';
  document.getElementById('bot-pip').style.background=isWhite?'#e8d5a0':'#1e1e1e';
  document.getElementById('top-name').textContent=`Computer (${difficulty[0].toUpperCase()+difficulty.slice(1)})`;
  document.getElementById('bot-name').textContent='You';

  showScreen('game-screen');
  renderBoard();
  updateMoveList();
  updateEvalBar();
  updateStatus();

  // Computer goes first if player is Black
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn) setTimeout(doComputerMove,500);
}

// ════════════════════════════════════════════════════════════
//  RESTART  — same position, same colour, same difficulty
// ════════════════════════════════════════════════════════════
function restartGame(){
  document.getElementById('result-overlay').classList.remove('active');
  if(currentFen) startGame(currentFen, playerColor, difficulty);
}

// ════════════════════════════════════════════════════════════
//  RENDER BOARD
// ════════════════════════════════════════════════════════════
function renderBoard(){
  const board=document.getElementById('chessboard');
  board.innerHTML='';
  const flipped=playerColor==='black';

  for(let row=0;row<8;row++){
    for(let col=0;col<8;col++){
      const r=flipped?row:7-row;
      const c=flipped?7-col:col;
      const name=FILES[c]+(r+1);
      const isLight=(r+c)%2!==0;

      const div=document.createElement('div');
      div.className='sq '+(isLight?'light':'dark');
      div.dataset.sq=name;

      if(lastMove&&(name===lastMove.from||name===lastMove.to))
        div.classList.add(name===lastMove.from?'last-from':'last-to');
      if(selectedSq===name) div.classList.add('sel');

      const isHint=showHints&&legalMoves.some(m=>m.to===name);
      if(isHint){
        const s0=sq(c,r);
        if(game.board[s0]){const ring=document.createElement('div');ring.className='cap-ring';div.appendChild(ring);}
        else{div.classList.add('hint');const dot=document.createElement('div');dot.className='move-dot';div.appendChild(dot);}
      }

      if(col===0){const sp=document.createElement('span');sp.className='coord rank';sp.textContent=(r+1);div.appendChild(sp);}
      if(row===7){const sp=document.createElement('span');sp.className='coord file';sp.textContent=FILES[c];div.appendChild(sp);}

      const p=game.board[sq(c,r)];
      if(p){
        const el=document.createElement('div');
        el.className='piece';
        el.innerHTML=SVG[pieceKey(p)]||'';
        div.appendChild(el);
      }

      div.addEventListener('click', e=>onSquareClick(e,name));
      div.addEventListener('mousedown', e=>onDragStart(e,name));
      div.addEventListener('touchstart', e=>onDragStart(e,name), {passive:false});

      board.appendChild(div);
    }
  }
}

// ════════════════════════════════════════════════════════════
//  DRAG STATE
//  Key fix: track whether a real drag (moved >5px) happened.
//  If no real drag, treat release as a click — never duplicate.
//  The click event is suppressed after a real drag.
// ════════════════════════════════════════════════════════════
let dragState=null;

function onDragStart(e, name){
  if(isThinking||pendingPromo||game.isGameOver()) return;
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn) return;

  const p=game.board[parseSq(name)];
  if(!p||p.c!==playerTurn) return;

  // Only preventDefault on touch to avoid scroll; mouse can default
  if(e.type==='touchstart') e.preventDefault();

  const startPos=getEventPos(e);

  dragState={
    fromName: name,
    startPos,
    currentPos: {...startPos},
    isDragging: false,   // true only once pointer moves >5px
    cancelled:  false,
  };

  document.addEventListener('mousemove', onDragMove, {passive:false});
  document.addEventListener('mouseup',   onDragEnd,  {passive:false});
  document.addEventListener('touchmove', onDragMove, {passive:false});
  document.addEventListener('touchend',  onDragEnd,  {passive:false});
}

function onDragMove(e){
  if(!dragState) return;
  if(e.type==='touchmove') e.preventDefault();

  const pos=getEventPos(e);
  dragState.currentPos=pos;

  if(!dragState.isDragging){
    const dx=pos.x-dragState.startPos.x;
    const dy=pos.y-dragState.startPos.y;
    if(Math.sqrt(dx*dx+dy*dy)<5) return;  // haven't moved enough yet
    // Crossed threshold → start visual drag
    dragState.isDragging=true;

    // Select the piece now (for hint dots)
    selectSq(dragState.fromName);

    // Show ghost
    const ghost=document.getElementById('drag-ghost');
    const p=game.board[parseSq(dragState.fromName)];
    ghost.innerHTML=SVG[pieceKey(p)]||'';
    ghost.style.display='block';
    ghost.style.left=pos.x+'px';
    ghost.style.top =pos.y+'px';

    // Hide piece on origin square
    const originEl=document.querySelector(`[data-sq="${dragState.fromName}"]`);
    if(originEl) originEl.classList.add('dragging-from');
  } else {
    // Move ghost
    const ghost=document.getElementById('drag-ghost');
    ghost.style.left=pos.x+'px';
    ghost.style.top =pos.y+'px';
  }
}

function onDragEnd(e){
  if(!dragState) return;

  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend',  onDragEnd);

  const wasDragging=dragState.isDragging;
  const fromName=dragState.fromName;

  // Hide ghost and remove dragging-from class
  const ghost=document.getElementById('drag-ghost');
  ghost.style.display='none';
  ghost.innerHTML='';
  const originEl=document.querySelector(`[data-sq="${fromName}"]`);
  if(originEl) originEl.classList.remove('dragging-from');

  dragState=null;

  if(!wasDragging){
    // Short tap, no real drag — the 'click' event will handle it naturally.
    // Do nothing here; don't duplicate.
    return;
  }

  // Real drag ended — find drop target
  if(e.type==='touchend') e.preventDefault();
  const pos=getEventPos(e);
  const toName=squareAtPoint(pos.x, pos.y);

  if(toName && toName!==fromName){
    const hit=legalMoves.find(m=>m.to===toName);
    if(hit){
      if(hit.flags.includes('p')){
        pendingPromo={from:fromName,to:toName};
        showPromo();
        return;
      }
      doPlayerMove(fromName, toName, 'q');
      return;
    }
  }
  // Dropped on non-legal square or same square → piece returns (just re-render)
  // Keep selection active so player can click a valid square next
  renderBoard();
}

function getEventPos(e){
  if(e.touches&&e.touches.length>0)        return{x:e.touches[0].clientX,       y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length>0) return{x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
  return{x:e.clientX, y:e.clientY};
}

function squareAtPoint(x,y){
  const ghost=document.getElementById('drag-ghost');
  const prev=ghost.style.display;
  ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  ghost.style.display=prev;
  if(!el) return null;
  const s=el.closest('[data-sq]');
  return s?s.dataset.sq:null;
}

// ════════════════════════════════════════════════════════════
//  CLICK INTERACTION
// ════════════════════════════════════════════════════════════
function onSquareClick(e, name){
  // If a real drag just ended, the dragEnd already handled it.
  // dragState is null by the time click fires, so this is safe.
  if(isThinking||pendingPromo||game.isGameOver()) return;
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn) return;

  const p=game.board[parseSq(name)];

  if(selectedSq){
    // Tap selected square again → deselect
    if(selectedSq===name){
      selectedSq=null; legalMoves=[];
      renderBoard(); return;
    }
    const hit=legalMoves.find(m=>m.to===name);
    if(hit){
      if(hit.flags.includes('p')){pendingPromo={from:selectedSq,to:name};showPromo();return;}
      doPlayerMove(selectedSq,name,'q'); return;
    }
    if(p&&p.c===playerTurn){selectSq(name);return;}
    selectedSq=null; legalMoves=[]; renderBoard(); return;
  }
  if(p&&p.c===playerTurn) selectSq(name);
}

function selectSq(name){
  selectedSq=name;
  legalMoves=game.moves({square:name});
  renderBoard();
}

// ════════════════════════════════════════════════════════════
//  PLAYER / COMPUTER MOVES
// ════════════════════════════════════════════════════════════
function doPlayerMove(from,to,promo){
  const result=game.move({from,to,promotion:promo});
  if(!result) return;
  lastMove={from,to};
  selectedSq=null; legalMoves=[];
  moveHistory.push(result.san);
  pendingPromo=null;
  document.getElementById('promo-overlay').classList.remove('active');
  renderBoard(); updateMoveList(); updateStatus(); updateEvalBar();
  if(game.isGameOver()){setTimeout(showResult,600);return;}
  setTimeout(doComputerMove,300);
}

function doComputerMove(){
  if(game.isGameOver()) return;
  const compTurn=playerColor==='white'?B:W;
  if(game.turn!==compTurn) return;
  isThinking=true; updateStatus();
  setTimeout(()=>{
    const best=getBestMove(game,difficulty);
    isThinking=false;
    if(!best){updateStatus();return;}
    const result=game.move({from:best.from,to:best.to,promotion:best.promotion||'q'});
    if(result){lastMove={from:best.from,to:best.to};moveHistory.push(result.san);renderBoard();updateMoveList();}
    updateStatus(); updateEvalBar();
    if(game.isGameOver()) setTimeout(showResult,600);
  },30);
}

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function updateStatus(){
  const el=document.getElementById('status-txt');
  if(game.isCheckmate()){el.textContent='Checkmate!';updateResignBtn();return;}
  if(game.isDraw()){el.textContent='Draw';updateResignBtn();return;}
  if(isThinking){el.innerHTML='<span style="color:var(--gold)">Computer thinking…</span>';updateResignBtn();return;}
  const playerTurn=playerColor==='white'?W:B;
  el.textContent=game.turn===playerTurn?(game.isCheck()?'⚠ You are in check!':'Your move'):"Computer's turn";
  updateResignBtn();
}

function updateMoveList(){
  const el=document.getElementById('move-list');el.innerHTML='';
  for(let i=0;i<moveHistory.length;i+=2){
    const pair=document.createElement('div');pair.className='move-pair';
    const num=document.createElement('span');num.className='move-num';num.textContent=(i/2+1)+'.';
    const w=document.createElement('span');w.className='move-san';w.textContent=moveHistory[i]||'';
    const b=document.createElement('span');b.className='move-san';b.style.color='var(--cream-dim)';b.textContent=moveHistory[i+1]||'';
    pair.append(num,w,b);el.appendChild(pair);
  }
  el.scrollTop=el.scrollHeight;
}

function updateEvalBar(){
  let score=0;
  for(let s=0;s<128;s++){if(!valid(s))continue;const p=game.board[s];if(!p)continue;score+=p.c===W?TYPE_TO_VAL[p.t]:-TYPE_TO_VAL[p.t];}
  const f=score/100;
  const clamped=Math.max(-5,Math.min(5,f));
  const pct=((clamped+5)/10)*100;
  document.getElementById('eval-fill').style.width=pct+'%';
  const lbl=Math.abs(f)>50?(f>0?'+M':'-M'):(f>=0?'+':'')+f.toFixed(1);
  document.getElementById('eval-score').textContent=lbl;
}

// ════════════════════════════════════════════════════════════
//  PROMOTION
// ════════════════════════════════════════════════════════════
function showPromo(){
  const color=game.turn;
  const row=document.getElementById('promo-row');row.innerHTML='';
  for(const [type,char] of[[Q,'q'],[R,'r'],[Bi,'b'],[N,'n']]){
    const key=(color===W?'w':'b')+TYPE_TO_CHAR[type].toUpperCase();
    const btn=document.createElement('button');btn.className='promo-btn';
    btn.innerHTML=SVG[key]||'';
    btn.onclick=()=>doPlayerMove(pendingPromo.from,pendingPromo.to,char);
    row.appendChild(btn);
  }
  document.getElementById('promo-overlay').classList.add('active');
}

// ════════════════════════════════════════════════════════════
//  RESULT
// ════════════════════════════════════════════════════════════
function showResult(){
  const playerTurn=playerColor==='white'?W:B;
  const title=document.getElementById('r-title');
  const desc =document.getElementById('r-desc');
  if(game.isCheckmate()){
    const youWin=game.turn!==playerTurn;
    title.textContent=youWin?'🏆 Victory!':'Defeat';
    desc.textContent=(youWin?'You win':'Computer wins')+' by checkmate.';
  }else if(game.isStalemate()){title.textContent='Stalemate';desc.textContent='Draw by stalemate.';}
  else if(game.isInsufficientMaterial()){title.textContent='Draw';desc.textContent='Insufficient material.';}
  else if(game.isThreefold()){title.textContent='Draw';desc.textContent='Threefold repetition.';}
  else{title.textContent='Draw';desc.textContent='The game is a draw.';}
  document.getElementById('result-overlay').classList.add('active');
}

// ════════════════════════════════════════════════════════════
//  RESIGN
// ════════════════════════════════════════════════════════════
function onResignClick(e){
  if(!game||game.isGameOver()||isThinking) return;
  const playerTurn=playerColor==='white'?W:B;
  if(game.turn!==playerTurn) return; // not your turn, can't resign mid-think

  // Position the small popup near the resign button
  const popup=document.getElementById('resign-confirm');
  const btn=document.getElementById('resign-btn');
  const rect=btn.getBoundingClientRect();

  // Try to place popup above-left of button; clamp to viewport
  let top  = rect.top - 10 - 76; // 76 ≈ popup height
  let left = rect.right - 160;   // 160 ≈ popup width

  // Clamp so it never goes off screen
  top  = Math.max(8, Math.min(top,  window.innerHeight - 100));
  left = Math.max(8, Math.min(left, window.innerWidth  - 168));

  popup.style.top  = top  + 'px';
  popup.style.left = left + 'px';
  popup.classList.add('active');

  // Close if user clicks anywhere outside the popup
  setTimeout(()=>document.addEventListener('click', _outsideResignClose, {once:true, capture:true}), 0);
}

function _outsideResignClose(e){
  const popup=document.getElementById('resign-confirm');
  if(!popup.contains(e.target)) popup.classList.remove('active');
}

function closeResignConfirm(){
  document.getElementById('resign-confirm').classList.remove('active');
}

function confirmResign(){
  document.getElementById('resign-confirm').classList.remove('active');
  // Show defeat result screen
  const title=document.getElementById('r-title');
  const desc =document.getElementById('r-desc');
  title.textContent='Resigned';
  desc.textContent='You resigned. Better luck next time!';
  document.getElementById('result-overlay').classList.add('active');
}

function updateResignBtn(){
  const btn=document.getElementById('resign-btn');
  if(!btn||!game) return;
  const playerTurn=playerColor==='white'?W:B;
  const active=!game.isGameOver()&&!isThinking&&game.turn===playerTurn;
  btn.disabled=!active;
}

// ════════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════════
function goHome(){
  document.getElementById('result-overlay').classList.remove('active');
  document.getElementById('ng-overlay').classList.remove('active');
  document.getElementById('resign-confirm').classList.remove('active');
  showScreen('home-screen');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

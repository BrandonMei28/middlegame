<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Middlegame Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Chess.js for move validation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #252118;
    --border: #3a3328;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --cream: #f2e8d0;
    --cream-dim: #a89b7e;
    --light-sq: #f0d9b5;
    --dark-sq: #b58863;
    --light-sq-sel: #f6f669;
    --dark-sq-sel: #baca2b;
    --light-sq-move: #cdd16f;
    --dark-sq-move: #aaa23a;
    --red: #e04040;
    --green: #5cb85c;
    --text: #f2e8d0;
    --text-dim: #8a8070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; max-width: 900px; padding: 20px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── HOME ── */
  .home-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .home-header .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .home-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.0;
    color: var(--cream);
    letter-spacing: -1px;
  }

  .home-header h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .home-header p {
    margin-top: 16px;
    color: var(--cream-dim);
    font-size: 13px;
    letter-spacing: 0.5px;
    line-height: 1.7;
  }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    width: 100%;
    max-width: 520px;
  }

  .config-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .config-group { margin-bottom: 28px; }

  .toggle-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .toggle-btn {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: none;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .toggle-btn.active {
    background: var(--gold);
    color: var(--bg);
    font-weight: 500;
  }

  .toggle-btn:not(.active):hover { background: var(--surface2); color: var(--cream); }

  .difficulty-row {
    display: flex;
    gap: 8px;
  }

  .diff-btn {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.06); }
  .diff-btn:not(.active):hover { border-color: var(--cream-dim); color: var(--cream); }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    border: none;
    border-radius: 3px;
    color: var(--bg);
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .generate-btn:hover { background: var(--cream); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }

  /* ── GAME ── */
  #game-screen { flex-direction: column; align-items: center; gap: 16px; }

  .game-topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }

  .game-topbar .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    font-style: italic;
  }

  .topbar-btns { display: flex; gap: 10px; }

  .top-btn {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .top-btn:hover { border-color: var(--gold); color: var(--gold); }
  .top-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .game-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
    justify-content: center;
  }

  /* ── BOARD ── */
  .board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .player-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--cream-dim);
    width: 100%;
    padding: 0 4px;
  }

  .player-label .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .player-label.top-label { justify-content: flex-start; }
  .player-label.bot-label { justify-content: flex-start; }

  .board-container {
    position: relative;
  }

  #chessboard {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    width: min(480px, 90vw);
    height: min(480px, 90vw);
    border: 2px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    user-select: none;
  }

  .square {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: filter 0.1s;
  }

  .square.light { background: var(--light-sq); }
  .square.dark  { background: var(--dark-sq); }
  .square.selected { background: var(--light-sq-sel) !important; }
  .square.selected.dark { background: var(--dark-sq-sel) !important; }
  .square.move-hint.light { background: var(--light-sq-move); }
  .square.move-hint.dark  { background: var(--dark-sq-move); }

  .square.last-from.light { background: #cdd26a; }
  .square.last-from.dark  { background: #aaa23a; }
  .square.last-to.light   { background: #cdd26a; }
  .square.last-to.dark    { background: #aaa23a; }

  .coord {
    position: absolute;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: rgba(0,0,0,0.35);
    line-height: 1;
  }

  .square.dark .coord { color: rgba(255,255,255,0.25); }
  .coord.file { bottom: 2px; right: 3px; }
  .coord.rank { top: 2px; left: 3px; }

  .piece {
    width: 90%;
    height: 90%;
    pointer-events: none;
    position: relative;
    z-index: 2;
  }

  .move-dot {
    width: 30%;
    height: 30%;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    pointer-events: none;
    position: absolute;
    z-index: 1;
  }

  .capture-ring {
    width: 90%;
    height: 90%;
    border-radius: 50%;
    border: 4px solid rgba(0,0,0,0.18);
    pointer-events: none;
    position: absolute;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 4px;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
  }

  .info-card-title {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .status-text {
    font-size: 13px;
    color: var(--cream);
    line-height: 1.6;
    min-height: 40px;
  }

  .move-list {
    max-height: 240px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .move-list::-webkit-scrollbar { width: 4px; }
  .move-list::-webkit-scrollbar-track { background: transparent; }
  .move-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .move-pair {
    display: grid;
    grid-template-columns: 24px 1fr 1fr;
    gap: 4px;
    align-items: center;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 2px;
  }

  .move-pair:hover { background: var(--surface2); }

  .move-num { color: var(--text-dim); font-size: 10px; }
  .move-san { color: var(--cream); cursor: default; padding: 2px 4px; border-radius: 2px; }
  .move-san:last-child:not(:first-child) { color: var(--cream-dim); }

  .eval-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eval-bar {
    flex: 1;
    height: 8px;
    background: #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .eval-fill {
    height: 100%;
    background: var(--cream);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 50%;
  }

  .eval-score {
    font-size: 11px;
    color: var(--cream-dim);
    width: 40px;
    text-align: right;
  }

  /* ── PROMOTION MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 24px;
    text-align: center;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .promo-pieces {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .promo-btn {
    width: 64px; height: 64px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
    font-size: 40px;
  }

  .promo-btn:hover { border-color: var(--gold); }

  /* ── RESULT MODAL ── */
  .result-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .result-modal.active { display: flex; }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 40px 48px;
    text-align: center;
    max-width: 380px;
  }

  .result-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .result-box p {
    color: var(--cream-dim);
    font-size: 13px;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .result-btns { display: flex; gap: 12px; justify-content: center; }

  .res-btn {
    padding: 10px 24px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--cream);
  }

  .res-btn.primary { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 500; }
  .res-btn:hover { opacity: 0.85; }

  /* ── LOADING ── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    font-style: italic;
  }

  /* responsive */
  @media (max-width: 680px) {
    .game-layout { flex-direction: column; align-items: center; }
    .sidebar { width: min(480px, 90vw); flex-direction: row; flex-wrap: wrap; }
    .info-card { flex: 1; min-width: 140px; }
  }
</style>
</head>
<body>

<!-- ═══ HOME SCREEN ═══ -->
<div id="home-screen" class="screen active">
  <div class="home-header">
    <div class="eyebrow">Chess Trainer</div>
    <h1>Middlegame<br><span>Battleground</span></h1>
    <p>Step into balanced, equal positions and<br>prove your middlegame mastery.</p>
  </div>

  <div class="config-panel">
    <div class="config-group">
      <div class="config-label">Play as</div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-color="white" onclick="selectColor('white')">♔ White</button>
        <button class="toggle-btn" data-color="black" onclick="selectColor('black')">♚ Black</button>
      </div>
    </div>

    <div class="config-group">
      <div class="config-label">Difficulty</div>
      <div class="difficulty-row">
        <button class="diff-btn active" data-diff="easy" onclick="selectDiff('easy')">Easy</button>
        <button class="diff-btn" data-diff="normal" onclick="selectDiff('normal')">Normal</button>
        <button class="diff-btn" data-diff="hard" onclick="selectDiff('hard')">Hard</button>
      </div>
    </div>

    <button class="generate-btn" onclick="generateMiddlegame()">Generate Middlegame →</button>
  </div>

  <div id="sf-status" style="margin-top:20px;font-size:11px;color:var(--text-dim);text-align:center;letter-spacing:1px;"></div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen">
  <div class="game-topbar">
    <div class="logo">Middlegame</div>
    <div class="topbar-btns">
      <button class="top-btn" onclick="restartGame()">↺ Restart</button>
      <button class="top-btn danger" onclick="goHome()">⌂ Home</button>
    </div>
  </div>

  <div class="game-layout">
    <div class="board-wrap">
      <div class="player-label top-label" id="top-label">
        <span class="pip" id="top-pip"></span>
        <span id="top-name">Opponent</span>
      </div>
      <div class="board-container">
        <div id="chessboard"></div>
      </div>
      <div class="player-label bot-label" id="bot-label">
        <span class="pip" id="bot-pip"></span>
        <span id="bot-name">You</span>
      </div>
    </div>

    <div class="sidebar">
      <div class="info-card">
        <div class="info-card-title">Status</div>
        <div class="status-text" id="status-text">Your turn</div>
      </div>

      <div class="info-card">
        <div class="info-card-title">Evaluation</div>
        <div class="eval-bar-wrap">
          <div class="eval-bar"><div class="eval-fill" id="eval-fill"></div></div>
          <div class="eval-score" id="eval-score">0.0</div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-title">Move History</div>
        <div class="move-list" id="move-list"></div>
      </div>

      <div class="info-card" id="diff-card">
        <div class="info-card-title">Settings</div>
        <div style="font-size:11px;color:var(--cream-dim);line-height:1.8;">
          <div id="settings-display"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PROMOTION MODAL ═══ -->
<div class="modal-overlay" id="promo-modal">
  <div class="modal">
    <h3>Promote Pawn</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- ═══ RESULT MODAL ═══ -->
<div class="result-modal" id="result-modal">
  <div class="result-box">
    <h2 id="result-title">Game Over</h2>
    <p id="result-desc"></p>
    <div class="result-btns">
      <button class="res-btn primary" onclick="restartGame()">Play Again</button>
      <button class="res-btn" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<!-- ═══ LOADING ═══ -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Generating position…</div>
</div>

<!-- ═══ STOCKFISH (Web Worker) ═══ -->
<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const DIFF_CONFIG = {
  easy:   { depth: 2, skillLevel: 0,  moveTime: 200,  errProb: 0.35 },
  normal: { depth: 8, skillLevel: 10, moveTime: 500,  errProb: 0 },
  hard:   { depth: 16, skillLevel: 20, moveTime: 1200, errProb: 0 }
};

// Curated neutral middlegame FENs (approximately equal, ~12 moves in)
const MIDDLEGAME_FENS = [
  // Ruy Lopez main line
  "r1bq1rk1/ppp2pbp/2np1np1/3Pp3/2B1P3/2NP1N2/PPP2PPP/R1BQR1K1 w - - 0 9",
  // Queen's Gambit Declined
  "rnbqr1k1/ppp1bppp/3p1n2/3Pp3/2PP4/2N1PN2/PP3PPP/R1BQKB1R w KQ - 0 9",
  // Sicilian Najdorf
  "r1bqkb1r/1p2pppp/p1np1n2/6B1/3NP3/2N5/PPP2PPP/R2QKB1R w KQkq - 0 7",
  // French Defense
  "rnbqkb1r/pp3ppp/2pp1n2/4p3/2PPP3/2N2N2/PP3PPP/R1BQKB1R w KQkq - 0 7",
  // King's Indian Defense
  "rnbq1rk1/ppp1ppbp/3p1np1/8/2PPP3/2N2N2/PP2BPPP/R1BQK2R w KQ - 0 8",
  // Nimzo-Indian
  "r1bq1rk1/pppp1ppp/2n2n2/4p3/1bPP4/2N1PN2/PP3PPP/R1BQKB1R w KQ - 0 7",
  // Catalan
  "r1bqkb1r/pp3ppp/2np1n2/4p3/2pPP3/2N2NP1/PP3PBP/R1BQK2R w KQkq - 0 8",
  // English Opening
  "r1bqkb1r/ppp2ppp/2np1n2/4p3/2P1P3/2NP1N2/PP3PPP/R1BQKB1R w KQkq - 0 7",
  // Caro-Kann
  "r1bqkb1r/pp2pppp/2np1n2/6B1/2pPP3/2N2N2/PP3PPP/R2QKB1R w KQkq - 0 8",
  // Grünfeld Defense
  "rnbqkb1r/pp2pp1p/6p1/2pP4/4P3/2N5/PP3PPP/R1BQKBNR w KQkq - 0 8",
];

// SVG piece definitions (lightweight inline SVGs)

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let game = null;
let playerColor = 'white';
let difficulty = 'easy';
let selectedSquare = null;
let legalMoves = [];
let engineWorker = null;
let engineReady = false;
let isComputerThinking = false;
let pendingPromotion = null;
let lastMove = null;
let moveHistory = [];
let startFen = '';

// ─────────────────────────────────────────────
// HOME SCREEN
// ─────────────────────────────────────────────
function selectColor(c) {
  playerColor = c;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.color === c));
}

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
}

async function generateMiddlegame() {
  showLoading('Generating position…');
  const fen = MIDDLEGAME_FENS[Math.floor(Math.random() * MIDDLEGAME_FENS.length)];
  startFen = fen;
  await startGame(fen);
}

// ─────────────────────────────────────────────
// STOCKFISH SETUP (CDN via importScripts in worker)
// ─────────────────────────────────────────────
const SF_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';

function initEngine() {
  return new Promise((resolve) => {
    try {
      // Try to create worker from CDN
      const workerCode = `importScripts('${SF_CDN}');`;
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      engineWorker = new Worker(url);

      let initDone = false;
      engineWorker.onmessage = (e) => {
        const msg = e.data;
        if ((msg.includes('uciok') || msg.includes('readyok')) && !initDone) {
          initDone = true;
          engineReady = true;
          document.getElementById('sf-status').textContent = '✓ Stockfish engine ready';
          resolve(true);
        }
      };
      engineWorker.onerror = () => {
        engineReady = false;
        resolve(false);
      };
      engineWorker.postMessage('uci');
      engineWorker.postMessage('isready');
      setTimeout(() => { if (!initDone) { engineReady = false; resolve(false); } }, 5000);
    } catch (e) {
      engineReady = false;
      resolve(false);
    }
  });
}

function engineSend(cmd) {
  if (engineWorker) engineWorker.postMessage(cmd);
}

function getBestMove(fen, config) {
  return new Promise((resolve) => {
    if (!engineReady || !engineWorker) { resolve(getRandomMove()); return; }

    // Set skill level
    engineSend(`setoption name Skill Level value ${config.skillLevel}`);
    engineSend(`position fen ${fen}`);
    engineSend(`go depth ${config.depth} movetime ${config.moveTime}`);

    const handler = (e) => {
      const msg = e.data;
      if (msg.startsWith('bestmove')) {
        engineWorker.removeEventListener('message', handler);
        const parts = msg.split(' ');
        const mv = parts[1];
        if (mv && mv !== '(none)') {
          // Easy: sometimes play random
          if (difficulty === 'easy' && Math.random() < config.errProb) {
            resolve(getRandomMove());
          } else {
            resolve(mv);
          }
        } else {
          resolve(null);
        }
      }
    };
    engineWorker.addEventListener('message', handler);
  });
}

function getEvaluation(fen) {
  return new Promise((resolve) => {
    if (!engineReady || !engineWorker) { resolve(0); return; }
    engineSend(`position fen ${fen}`);
    engineSend('go depth 10');
    let evalScore = 0;
    const handler = (e) => {
      const msg = e.data;
      if (msg.includes('score cp')) {
        const match = msg.match(/score cp (-?\d+)/);
        if (match) evalScore = parseInt(match[1]) / 100;
      }
      if (msg.includes('score mate')) {
        const match = msg.match(/score mate (-?\d+)/);
        if (match) evalScore = match[1] > 0 ? 99 : -99;
      }
      if (msg.startsWith('bestmove')) {
        engineWorker.removeEventListener('message', handler);
        resolve(evalScore);
      }
    };
    engineWorker.addEventListener('message', handler);
  });
}

function getRandomMove() {
  const moves = game.moves({ verbose: true });
  if (!moves.length) return null;
  return moves[Math.floor(Math.random() * moves.length)].lan || moves[0].from + moves[0].to;
}

// ─────────────────────────────────────────────
// GAME START
// ─────────────────────────────────────────────
async function startGame(fen) {
  game = new Chess(fen);
  selectedSquare = null;
  legalMoves = [];
  lastMove = null;
  moveHistory = [];
  isComputerThinking = false;
  pendingPromotion = null;

  // Labels
  const isWhite = playerColor === 'white';
  document.getElementById('top-name').textContent = `Computer (${difficulty.charAt(0).toUpperCase()+difficulty.slice(1)})`;
  document.getElementById('bot-name').textContent = 'You';
  document.getElementById('top-pip').style.background = isWhite ? '#222' : '#fff';
  document.getElementById('bot-pip').style.background = isWhite ? '#fff' : '#222';
  document.getElementById('settings-display').innerHTML =
    `Playing as <b style="color:var(--cream)">${playerColor}</b><br>Difficulty: <b style="color:var(--cream)">${difficulty}</b>`;

  showScreen('game-screen');
  renderBoard();
  updateMoveList();
  updateEval(0);
  updateStatus();
  hideLoading();

  // If player is black, computer plays first
  if (playerColor === 'black' && game.turn() === 'w') {
    setTimeout(() => computerMove(), 600);
  } else if (playerColor === 'white' && game.turn() === 'b') {
    setTimeout(() => computerMove(), 600);
  }
}

// ─────────────────────────────────────────────
// BOARD RENDERING
// ─────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('chessboard');
  board.innerHTML = '';
  const flipped = playerColor === 'black';

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const r = flipped ? row : 7 - row;
      const c = flipped ? 7 - col : col;
      const file = 'abcdefgh'[c];
      const rank = r + 1;
      const sqName = file + rank;
      const isLight = (r + c) % 2 !== 0;

      const sq = document.createElement('div');
      sq.className = `square ${isLight ? 'light' : 'dark'}`;
      sq.dataset.sq = sqName;

      // Highlight last move
      if (lastMove && (sqName === lastMove.from || sqName === lastMove.to)) {
        sq.classList.add(sqName === lastMove.from ? 'last-from' : 'last-to');
      }

      // Selected
      if (selectedSquare === sqName) sq.classList.add('selected');

      // Move hints
      const hint = legalMoves.find(m => m.to === sqName);
      if (hint) {
        const piece = game.get(sqName);
        if (piece) {
          const ring = document.createElement('div');
          ring.className = 'capture-ring';
          sq.appendChild(ring);
        } else {
          sq.classList.add('move-hint');
          const dot = document.createElement('div');
          dot.className = 'move-dot';
          sq.appendChild(dot);
        }
      }

      // Coordinates
      if (col === 7) {
        const rankLabel = document.createElement('span');
        rankLabel.className = 'coord rank';
        rankLabel.textContent = rank;
        sq.appendChild(rankLabel);
      }
      if (row === 7) {
        const fileLabel = document.createElement('span');
        fileLabel.className = 'coord file';
        fileLabel.textContent = file;
        sq.appendChild(fileLabel);
      }

      // Piece
      const piece = game.get(sqName);
      if (piece) {
        const key = (piece.color === 'w' ? 'w' : 'b') + piece.type.toUpperCase();
        const img = document.createElement('div');
        img.className = 'piece';
        img.innerHTML = PIECE_SVG[key] || '';
        sq.appendChild(img);
      }

      sq.addEventListener('click', () => onSquareClick(sqName));
      board.appendChild(sq);
    }
  }
}

// ─────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────
function onSquareClick(sqName) {
  if (isComputerThinking || pendingPromotion) return;
  if (game.isGameOver()) return;

  const currentTurn = game.turn();
  const playerTurn = playerColor === 'white' ? 'w' : 'b';
  if (currentTurn !== playerTurn) return;

  const piece = game.get(sqName);

  // Already selected
  if (selectedSquare) {
    const move = legalMoves.find(m => m.to === sqName);
    if (move) {
      // Check promotion
      if (move.flags && move.flags.includes('p')) {
        pendingPromotion = { from: selectedSquare, to: sqName };
        showPromoModal();
        return;
      }
      executeMove(selectedSquare, sqName);
      return;
    }

    // Reselect own piece
    if (piece && piece.color === playerTurn) {
      selectSquare(sqName);
      return;
    }

    // Deselect
    selectedSquare = null;
    legalMoves = [];
    renderBoard();
    return;
  }

  // First click
  if (piece && piece.color === playerTurn) {
    selectSquare(sqName);
  }
}

function selectSquare(sqName) {
  selectedSquare = sqName;
  legalMoves = game.moves({ square: sqName, verbose: true });
  renderBoard();
}

function executeMove(from, to, promotion = 'q') {
  const result = game.move({ from, to, promotion });
  if (!result) return;

  lastMove = { from, to };
  selectedSquare = null;
  legalMoves = [];
  moveHistory.push(result.san);
  pendingPromotion = null;

  renderBoard();
  updateMoveList();
  updateStatus();
  hidePromoModal();

  if (game.isGameOver()) { showResult(); return; }

  // Eval (background)
  if (engineReady) {
    getEvaluation(game.fen()).then(score => updateEval(score));
  }

  // Computer responds
  setTimeout(() => computerMove(), 400);
}

async function computerMove() {
  if (game.isGameOver()) return;
  const compTurn = playerColor === 'white' ? 'b' : 'w';
  if (game.turn() !== compTurn) return;

  isComputerThinking = true;
  updateStatus();

  const config = DIFF_CONFIG[difficulty];
  let mv;

  if (engineReady) {
    mv = await getBestMove(game.fen(), config);
  } else {
    await delay(300 + Math.random() * 400);
    mv = getRandomMove();
  }

  if (!mv) { isComputerThinking = false; updateStatus(); return; }

  const from = mv.slice(0, 2);
  const to   = mv.slice(2, 4);
  const promo = mv.length > 4 ? mv[4] : 'q';

  const result = game.move({ from, to, promotion: promo });
  if (result) {
    lastMove = { from, to };
    moveHistory.push(result.san);
    renderBoard();
    updateMoveList();
  }

  isComputerThinking = false;
  updateStatus();

  if (game.isGameOver()) { showResult(); return; }

  if (engineReady) {
    getEvaluation(game.fen()).then(score => updateEval(score));
  }
}

// ─────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────
function updateStatus() {
  const el = document.getElementById('status-text');
  if (game.isCheckmate()) { el.textContent = 'Checkmate!'; return; }
  if (game.isDraw()) { el.textContent = 'Draw'; return; }
  if (isComputerThinking) { el.innerHTML = '<span style="color:var(--gold)">Computer thinking…</span>'; return; }
  const playerTurn = playerColor === 'white' ? 'w' : 'b';
  if (game.turn() === playerTurn) {
    el.textContent = game.isCheck() ? '⚠ You are in check!' : 'Your turn';
  } else {
    el.textContent = "Computer's turn";
  }
}

function updateMoveList() {
  const el = document.getElementById('move-list');
  el.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const pair = document.createElement('div');
    pair.className = 'move-pair';
    const num = document.createElement('span');
    num.className = 'move-num';
    num.textContent = (i / 2 + 1) + '.';
    const white = document.createElement('span');
    white.className = 'move-san';
    white.textContent = moveHistory[i] || '';
    const black = document.createElement('span');
    black.className = 'move-san';
    black.textContent = moveHistory[i + 1] || '';
    pair.appendChild(num);
    pair.appendChild(white);
    pair.appendChild(black);
    el.appendChild(pair);
  }
  el.scrollTop = el.scrollHeight;
}

function updateEval(score) {
  // Score is from white's perspective
  const clamped = Math.max(-5, Math.min(5, score));
  const pct = ((clamped + 5) / 10) * 100;
  document.getElementById('eval-fill').style.width = pct + '%';
  const display = Math.abs(score) > 50 ? (score > 0 ? '+M' : '-M') : (score >= 0 ? '+' : '') + score.toFixed(1);
  document.getElementById('eval-score').textContent = display;
}

// ─────────────────────────────────────────────
// PROMOTION
// ─────────────────────────────────────────────
function showPromoModal() {
  const color = game.turn();
  const pieces = ['q', 'r', 'b', 'n'];
  const labels = { q: 'Queen', r: 'Rook', b: 'Bishop', n: 'Knight' };
  const container = document.getElementById('promo-pieces');
  container.innerHTML = '';
  pieces.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'promo-btn';
    const key = (color === 'w' ? 'w' : 'b') + p.toUpperCase();
    btn.innerHTML = PIECE_SVG[key] || p;
    btn.title = labels[p];
    btn.onclick = () => {
      const { from, to } = pendingPromotion;
      executeMove(from, to, p);
    };
    container.appendChild(btn);
  });
  document.getElementById('promo-modal').classList.add('active');
}

function hidePromoModal() {
  document.getElementById('promo-modal').classList.remove('active');
}

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────
function showResult() {
  const title = document.getElementById('result-title');
  const desc = document.getElementById('result-desc');
  const playerTurn = playerColor === 'white' ? 'w' : 'b';

  if (game.isCheckmate()) {
    const winner = game.turn() === playerTurn ? 'Computer wins' : 'You win';
    title.textContent = game.turn() !== playerTurn ? '🏆 Victory!' : 'Defeat';
    desc.textContent = `${winner} by checkmate.`;
  } else if (game.isStalemate()) {
    title.textContent = 'Stalemate';
    desc.textContent = 'The game is a draw by stalemate.';
  } else if (game.isInsufficientMaterial()) {
    title.textContent = 'Draw';
    desc.textContent = 'Insufficient material to checkmate.';
  } else if (game.isThreefoldRepetition()) {
    title.textContent = 'Draw';
    desc.textContent = 'Threefold repetition.';
  } else {
    title.textContent = 'Draw';
    desc.textContent = 'The game ended in a draw.';
  }

  setTimeout(() => {
    document.getElementById('result-modal').classList.add('active');
  }, 600);
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function restartGame() {
  document.getElementById('result-modal').classList.remove('active');
  showLoading('Restarting…');
  setTimeout(() => {
    const fen = MIDDLEGAME_FENS[Math.floor(Math.random() * MIDDLEGAME_FENS.length)];
    startFen = fen;
    startGame(fen);
  }, 300);
}

function goHome() {
  document.getElementById('result-modal').classList.remove('active');
  if (engineWorker) { engineSend('stop'); }
  showScreen('home-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('active');
}

function hideLoading() {
  document.getElementById('loading').classList.remove('active');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(async () => {
  document.getElementById('sf-status').textContent = 'Loading Stockfish engine…';
  const ok = await initEngine();
  if (!ok) {
    document.getElementById('sf-status').textContent = '⚠ Engine unavailable — using random moves (open via file:// or enable CORS)';
  }
})();
</script>
